<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trezo Cloud — La trésorerie de votre PME, synchronisée</title>
<meta name="description" content="Gestion de trésorerie pour PME : encaissements, décaissements, salaires, stocks, factures.">
<meta name="theme-color" content="#0E5A45">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<style>
:root{
  --vert:#0E5A45; --vert-fonce:#0A3D2F; --ambre:#F2B33D; --ambre-fonce:#8A6210;
  --menthe:#7FC8A9; --sable:#F7F3EC; --blanc:#FFFFFF;
  --encre:#1C2420; --gris:#5E6B64; --ligne:#E4DDD1;
  --rouge:#C0492F; --rouge-pale:#FBEAE5; --vert-pale:#E3F2EA; --ambre-pale:#FCF0D8;
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'Manrope',system-ui,-apple-system,sans-serif;background:var(--sable);color:var(--encre);min-height:100vh;padding-bottom:calc(74px + env(safe-area-inset-bottom))}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:1rem}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:.7rem .85rem;border:1.5px solid var(--ligne);border-radius:10px;background:var(--blanc);color:var(--encre)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--vert);outline-offset:1px;border-color:var(--vert)}
label{display:block;font-size:.82rem;font-weight:600;color:var(--gris);margin:.85rem 0 .3rem}
h1{font-size:1.35rem;font-weight:800}
h2{font-size:1.1rem;font-weight:800;margin-bottom:.75rem}
h3{font-size:.95rem;font-weight:800}

/* ---------- En-tête ---------- */
header{position:sticky;top:0;z-index:40;background:var(--vert);color:var(--blanc);padding:.7rem 1rem;padding-top:calc(.7rem + env(safe-area-inset-top));display:flex;align-items:center;gap:.7rem}
header .hlogo{width:36px;height:36px;border-radius:9px;flex:none;object-fit:cover;background:var(--blanc)}
header .hname{font-weight:800;font-size:1.05rem;line-height:1.15;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
header .hsub{font-size:.68rem;font-weight:600;opacity:.75}
.btn-lock{background:rgba(255,255,255,.14);color:var(--blanc);border-radius:10px;padding:.5rem .7rem;font-weight:700;font-size:.8rem;flex:none}

/* ---------- Boutons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.75rem 1.2rem;border-radius:11px;font-weight:800;font-size:.95rem;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--vert);color:var(--blanc)}
.btn-a{background:var(--ambre);color:#3d2a00}
.btn-o{background:var(--blanc);color:var(--vert);border:1.5px solid var(--vert)}
.btn-d{background:var(--rouge-pale);color:var(--rouge)}
.btn-sm{padding:.45rem .8rem;font-size:.8rem;border-radius:9px}
.btn-full{width:100%}
.btn[disabled]{opacity:.5;pointer-events:none}

/* ---------- Cartes ---------- */
main{max-width:1080px;margin:0 auto;padding:1rem}
.card{background:var(--blanc);border:1px solid var(--ligne);border-radius:var(--r);padding:1.1rem;margin-bottom:1rem}
.hero{background:var(--vert);color:var(--blanc);border:none;position:relative;overflow:hidden}
.hero .hbars{position:absolute;right:14px;bottom:0;display:flex;align-items:flex-end;gap:7px;opacity:.35}
.hero .hbars i{display:block;width:13px;border-radius:4px 4px 0 0}
.hero .lbl{font-size:.75rem;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.06em}
.hero .big{font-size:2.1rem;font-weight:800;letter-spacing:-.02em;margin:.15rem 0 .4rem}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.kpi{background:var(--blanc);border:1px solid var(--ligne);border-radius:var(--r);padding:.9rem}
.kpi .lbl{font-size:.72rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.05em}
.kpi .val{font-size:1.25rem;font-weight:800;margin-top:.2rem;letter-spacing:-.01em}
.kpi.in .val{color:var(--vert)} .kpi.out .val{color:var(--rouge)}

/* ---------- Listes ---------- */
.row{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--ligne)}
.row:last-child{border-bottom:none}
.row .dot{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;flex:none;font-size:1.05rem}
.dot.in{background:var(--vert-pale);color:var(--vert)} .dot.out{background:var(--rouge-pale);color:var(--rouge)}
.row .rmain{flex:1;min-width:0}
.row .rt{font-weight:700;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .rs{font-size:.78rem;color:var(--gris)}
.row .ramt{font-weight:800;font-size:.92rem;white-space:nowrap}
.ramt.in{color:var(--vert)} .ramt.out{color:var(--rouge)}
.chip{display:inline-block;padding:.2rem .6rem;border-radius:99px;font-size:.72rem;font-weight:700}
.chip-g{background:var(--vert-pale);color:var(--vert)} .chip-r{background:var(--rouge-pale);color:var(--rouge)} .chip-a{background:var(--ambre-pale);color:var(--ambre-fonce)}
.empty{text-align:center;color:var(--gris);padding:1.6rem .5rem;font-size:.9rem}
.pbar{height:9px;background:var(--sable);border-radius:99px;overflow:hidden;margin:.4rem 0}
.pbar i{display:block;height:100%;background:var(--ambre);border-radius:99px;transition:width .4s}
.pbar i.done{background:var(--menthe)}

/* ---------- Onglets ---------- */
.tabs{display:flex;background:var(--blanc);border:1px solid var(--ligne);border-radius:12px;padding:4px;margin-bottom:1rem}
.tabs button{flex:1;padding:.6rem;border-radius:9px;font-weight:800;font-size:.88rem;color:var(--gris)}
.tabs button.on{background:var(--vert);color:var(--blanc)}
.tabs button.on.t-out{background:var(--rouge)}

/* ---------- Navigation ---------- */
nav.bottom{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--blanc);border-top:1px solid var(--ligne);display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav.bottom button{flex:1;padding:.55rem 0 .5rem;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.64rem;font-weight:700;color:var(--gris)}
nav.bottom button svg{width:23px;height:23px}
nav.bottom button.on{color:var(--vert)}
aside.side{display:none}

/* ---------- Feuille "Plus" + modales ---------- */
.sheet-bg{position:fixed;inset:0;background:rgba(20,30,25,.45);z-index:50;display:none;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
.sheet{background:var(--blanc);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:1.2rem;padding-bottom:calc(1.2rem + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto}
@media(min-width:720px){.sheet-bg{align-items:center;padding:1rem}.sheet{border-radius:20px}}
.sheet h2{display:flex;justify-content:space-between;align-items:center}
.sheet .close{font-size:1.5rem;color:var(--gris);padding:.2rem .5rem}
.menu-it{display:flex;align-items:center;gap:.8rem;width:100%;padding:.85rem .4rem;border-bottom:1px solid var(--ligne);font-weight:700;font-size:.95rem;text-align:left;color:var(--encre)}
.menu-it svg{width:22px;height:22px;color:var(--vert)}

/* ---------- Onboarding / licence ---------- */
.ob-bg{position:fixed;inset:0;background:var(--vert);z-index:100;overflow-y:auto;display:none}
.ob-bg.open{display:block}
.ob{max-width:480px;margin:0 auto;padding:2rem 1.3rem 3rem;color:var(--blanc)}
.ob .panel{background:var(--blanc);color:var(--encre);border-radius:18px;padding:1.4rem;margin-top:1.4rem}
.ob-logo{display:flex;align-items:center;gap:.8rem;margin-bottom:.4rem}
.steps{display:flex;gap:6px;margin-top:1.2rem}
.steps i{height:5px;flex:1;border-radius:99px;background:rgba(255,255,255,.25)}
.steps i.on{background:var(--ambre)}
.plist .row .rt{font-weight:700}
.msg-err{color:var(--rouge);font-size:.85rem;font-weight:700;margin-top:.5rem}
.msg-ok{color:var(--vert);font-size:.85rem;font-weight:700;margin-top:.5rem}

/* ---------- Tableaux ---------- */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gris);padding:.5rem .55rem;border-bottom:1.5px solid var(--ligne);white-space:nowrap}
td{padding:.6rem .55rem;border-bottom:1px solid var(--ligne);white-space:nowrap}
.tr-alert td{background:var(--rouge-pale)}

/* ---------- Divers ---------- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.mt{margin-top:1rem}
.charts{display:grid;gap:1rem}
canvas{max-width:100%}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--encre);color:var(--blanc);padding:.7rem 1.2rem;border-radius:12px;font-weight:700;font-size:.88rem;z-index:120;opacity:0;pointer-events:none;transition:opacity .25s;max-width:90vw;text-align:center}
.toast.show{opacity:1}
body.readonly .adm{display:none !important}
body.pr-r .adm{display:none !important}
body.pr-w .act-del{display:none !important}
body.pr-c .act-del,body.pr-c .act-edit{display:none !important}
.ro-banner{display:none;background:var(--ambre);color:#3d2a00;font-weight:800;font-size:.8rem;text-align:center;padding:.45rem}
body.readonly .ro-banner{display:block}
.view{display:none}.view.on{display:block}
.inline-add{display:flex;gap:.5rem}.inline-add input{flex:1}
.fine{font-size:.78rem;color:var(--gris);line-height:1.5}

/* ---------- Bureau ---------- */
@media(min-width:900px){
  body{padding-bottom:0}
  nav.bottom{display:none}
  aside.side{display:block;position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--vert-fonce);color:var(--blanc);padding:1.2rem .8rem;z-index:45}
  aside.side .slogo{display:flex;align-items:center;gap:.6rem;padding:.4rem;margin-bottom:1.4rem;font-weight:800;font-size:1.2rem}
  aside.side button{display:flex;align-items:center;gap:.7rem;width:100%;padding:.7rem .8rem;border-radius:10px;color:rgba(255,255,255,.75);font-weight:700;font-size:.9rem;margin-bottom:.15rem;text-align:left}
  aside.side button svg{width:20px;height:20px}
  aside.side button.on{background:var(--vert);color:var(--blanc)}
  header,main{margin-left:220px}
  main{max-width:1000px;padding:1.4rem 2rem}
  .kgrid{grid-template-columns:repeat(4,1fr)}
  .charts{grid-template-columns:3fr 2fr}
  .hero .big{font-size:2.6rem}
}
/* ---------- Facture : aperçu & impression ---------- */
.inv-doc{background:#fff;color:#1C2420;padding:1.4rem;border-radius:8px;min-width:290px;font-size:.9rem;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.inv-head{display:flex;gap:.9rem;align-items:center;border-bottom:3px solid var(--vert);padding-bottom:.8rem;margin-bottom:.9rem}
.inv-head img{width:52px;height:52px;border-radius:10px;object-fit:cover}
.inv-co{font-weight:800;font-size:1.15rem;color:var(--vert)}
.inv-num{font-size:.85rem;color:#555;font-weight:700}
.inv-meta{display:flex;justify-content:space-between;gap:1rem;margin-bottom:.9rem;font-size:.85rem;flex-wrap:wrap}
.inv-table{width:100%;border-collapse:collapse;font-size:.85rem}
.inv-table th{background:var(--vert);color:#fff;text-align:left;padding:.45rem .5rem;font-size:.75rem;text-transform:none;letter-spacing:0;border:none}
.inv-table td{padding:.45rem .5rem;border-bottom:1px solid #e5e0d5}
.inv-tot{margin-top:.9rem;text-align:right}
.inv-tot .ttc{font-weight:800;font-size:1.05rem;margin-top:.25rem;color:var(--vert)}
.inv-foot{margin-top:1.2rem;font-size:.7rem;color:#999}
#print-area{display:none}
#hd-ex{max-width:180px;font-weight:800;cursor:pointer}
#hd-ex option{color:#1C2420;background:#fff;font-weight:700}
.thsort{cursor:pointer;user-select:none;white-space:nowrap}
.thsort:hover{color:var(--vert)}
@media print{body>*{display:none !important}#print-area{display:block !important}#print-area .inv-doc{box-shadow:none;border-radius:0;padding:0}}
@media(prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
</style>
</head>
<body>

<div class="ro-banner">Mode lecture seule — les modifications sont désactivées</div>

<header>
  <img class="hlogo" id="h-logo" alt="" src="icon-192.png">
  <div style="flex:1;min-width:0">
    <div class="hname" id="h-name">Trezo</div>
    <div class="hsub"><span id="h-lic"></span><span id="h-sync"></span></div>
  </div>
  <button class="btn-lock" id="btn-refresh" title="Recharger les données depuis le cloud">⟳</button>
  <select class="btn-lock" id="hd-ex" title="Naviguer entre les exercices comptables"></select>
  <button class="btn-lock" id="btn-lock" title="Basculer le mode lecture seule">🔒 Verrouiller</button>
  <button class="btn-lock" id="btn-logout" title="Se déconnecter">⏻ Déconnexion</button>
</header>

<aside class="side" id="side"></aside>

<main id="main">
  <div class="view" id="v-dash"></div>
  <div class="view" id="v-flux"></div>
  <div class="view" id="v-cli"></div>
  <div class="view" id="v-sal"></div>
  <div class="view" id="v-obj"></div>
  <div class="view" id="v-stock"></div>
  <div class="view" id="v-fact"></div>
  <div class="view" id="v-jour"></div>
  <div class="view" id="v-set"></div>
</main>

<nav class="bottom" id="bnav"></nav>

<div class="sheet-bg" id="sheet-plus"><div class="sheet">
  <h2>Menu <button class="close" onclick="closeSheet('sheet-plus')">×</button></h2>
  <div id="plus-items"></div>
</div></div>

<div class="sheet-bg" id="sheet-modal"><div class="sheet" id="modal-body"></div></div>

<div class="ob-bg" id="ob"><div class="ob" id="ob-body"></div></div>

<div class="toast" id="toast"></div>
<div id="print-area"></div>

<script>
'use strict';
/* ===== Trezo Cloud v1 — cœur ===== */
const CONFIG=window.TREZO_CONFIG||{};
const CURRENCIES=[["XOF","FCFA","Franc CFA (UEMOA)"],["XAF","FCFA","Franc CFA (CEMAC)"],["MAD","DH","Dirham marocain"],["TND","DT","Dinar tunisien"],["DZD","DA","Dinar algérien"],["EGP","E£","Livre égyptienne"],["NGN","₦","Naira nigérian"],["GHS","GH₵","Cedi ghanéen"],["KES","KSh","Shilling kényan"],["TZS","TSh","Shilling tanzanien"],["UGX","USh","Shilling ougandais"],["RWF","FRw","Franc rwandais"],["GNF","FG","Franc guinéen"],["CDF","FC","Franc congolais"],["MRU","UM","Ouguiya mauritanien"],["ZAR","R","Rand sud-africain"],["ETB","Br","Birr éthiopien"],["USD","$","Dollar US"],["EUR","€","Euro"]];
const CAT_IN=["Ventes","Avance client","Prestations de services","Remboursement","Apport","Autre"];
const CAT_OUT=["Achats fournisseurs","Loyer","Salaires","Transport","Électricité & eau","Internet & téléphone","Impôts & taxes","Entretien","Autre",'Charges fixes'];
const DEFAULT={v:2,company:{name:"",currency:"XOF",symbol:"FCFA",logo:null},license:null,products:[],accounts:[],clients:[],charges:[],chgPays:[],exercises:[],stockMov:[],tx:[],employees:[],salPays:[],goals:[],invoices:[],journal:[],settings:{pin:null,readOnly:false,invSeq:0}};
const LOGO='data:image/svg+xml;utf8,'+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='42' fill='#0E5A45'/><rect x='46' y='104' width='22' height='42' rx='6' fill='#F2B33D'/><rect x='78' y='84' width='22' height='62' rx='6' fill='#7FC8A9'/><rect x='110' y='58' width='22' height='88' rx='6' fill='#FFFFFF'/><rect x='38' y='36' width='116' height='16' rx='6' fill='#FFFFFF'/></svg>");
let S=JSON.parse(JSON.stringify(DEFAULT));
let SB=null,SESSION=null,COMPANY=null,DOC_VERSION=1,SAVE_T=null,SAVING=false,PENDING=false,PERMS=null,MYROLE='owner',MEMS=[];
function IS_ADMIN(){return MYROLE==='owner';}
function CUR_USER_LBL(){return (SESSION&&SESSION.user)?SESSION.user.email:'';}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const curMonth=()=>todayStr().slice(0,7);
const NF=new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0});
const fmt=n=>NF.format(Math.round(n||0))+' '+S.company.symbol;
const fmt2=(n,sym)=>NF.format(Math.round(n||0))+' '+sym;
const pdfN=n=>NF.format(Math.round(n||0)).replace(/[\u202F\u00A0]/g,' ');
function initialsOf(name){
 const words=String(name||'').trim().split(/\s+/).filter(w=>w.replace(/[^A-Za-zÀ-ÿ0-9]/g,'').length>0);
 let ini=words.map(w=>w[0]).join('').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);
 if(ini.length<2)ini=(String(name||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().replace(/[^A-Z0-9]/g,'')+'TZ').slice(0,2);
 return ini||'TRZ';
}
function monthLabel(m){const p=m.split('-');return new Date(+p[0],+p[1]-1,1).toLocaleDateString('fr-FR',{month:'short',year:'2-digit'});}
function dateLabel(d){return new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}
function log(txt){S.journal.unshift({d:new Date().toISOString(),txt,by:(SESSION&&SESSION.user)?SESSION.user.email:'',mod:(typeof CUR!=='undefined'&&CUR)?CUR:''});if(S.journal.length>300)S.journal.length=300;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);}
async function sha(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase();}
function setSync(t){const e=document.getElementById('h-sync');if(e)e.textContent=t;}
let INSTALL_EVT=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();INSTALL_EVT=e;});
async function promptInstall(){
 if(INSTALL_EVT){INSTALL_EVT.prompt();try{await INSTALL_EVT.userChoice;}catch(e){}INSTALL_EVT=null;return;}
 toast('Menu du navigateur → « Installer l’application » ou « Ajouter à l’écran d’accueil »');
}

/* ===== Persistance cloud (document par entreprise, verrou optimiste) ===== */
function save(){
 if(!COMPANY)return;
 PENDING=true;setSync(' · enregistrement…');
 clearTimeout(SAVE_T);SAVE_T=setTimeout(flushSave,700);
}
async function flushSave(){
 if(!COMPANY)return;
 if(SAVING){PENDING=true;return;}
 SAVING=true;PENDING=false;
 try{
  const payload={products:S.products,accounts:S.accounts,clients:S.clients,charges:S.charges,chgPays:S.chgPays,exercises:S.exercises,stockMov:S.stockMov,tx:S.tx,employees:S.employees,salPays:S.salPays,goals:S.goals,invoices:S.invoices,journal:S.journal,settings:S.settings,logo:S.company.logo};
  const r=await SB.rpc('save_data',{p_company:COMPANY.id,p_data:payload,p_version:DOC_VERSION});
  if(r.error)throw r.error;
  DOC_VERSION=r.data;setSync(' · ✓ synchronisé');
 }catch(e){
  const m=String((e&&e.message)||e);
  if(m.indexOf('version_conflict')>=0){toast('Données modifiées depuis un autre appareil — rechargement…');setTimeout(()=>location.reload(),1400);SAVING=false;return;}
  if(m.indexOf('license_expired')>=0){SAVING=false;showExpired();return;}
  if(m.indexOf('read_only_profile')>=0){setSync(' · lecture seule');toast('Profil en lecture seule — modification refusée par le serveur');SAVING=false;PENDING=false;return;}
  if(m.indexOf('suspended')>=0){SAVING=false;PENDING=false;showSuspended();return;}
  setSync(' · hors ligne — réessai…');PENDING=true;
  setTimeout(()=>{SAVING=false;flushSave();},8000);return;
 }
 SAVING=false;
 if(PENDING)save();
}
function licDaysLeft(){if(!S.license||!S.license.expiry)return -1;return Math.ceil((new Date(S.license.expiry).getTime()-Date.now())/86400000);}

/* ===== Feuilles / modales ===== */

function renderHeader(){
 document.getElementById('h-name').textContent=S.company.name||'Trezo';
 document.getElementById('h-logo').src=S.company.logo||LOGO;
 const d=licDaysLeft(),el=document.getElementById('h-lic');
 if(S.license)el.textContent=(S.license.trial?'Essai — ':'Licence — ')+(d>0?d+' j restants':'expirée');
 document.body.classList.toggle('readonly',!!S.settings.readOnly);
 document.getElementById('btn-lock').textContent=S.settings.readOnly?'🔓 Déverrouiller':'🔒 Verrouiller';
}
document.getElementById('btn-lock').onclick=async function(){
 if(!COMPANY)return;
 if(!S.settings.readOnly){
  if(!S.settings.pin){toast('Définissez d’abord un code PIN dans Réglages');go('set');return;}
  S.settings.readOnly=true;log('Mode lecture seule activé');save();renderHeader();if(R[CUR])R[CUR]();toast('Lecture seule activée — idéal pour montrer les chiffres');
 }else{
  const p=prompt('Code PIN pour déverrouiller :');if(p==null)return;
  if(await sha('PIN|'+p)===S.settings.pin){S.settings.readOnly=false;log('Mode lecture seule désactivé');save();renderHeader();if(R[CUR])R[CUR]();toast('Modifications réactivées');}
  else toast('Code PIN incorrect');
 }
};
document.getElementById('btn-refresh').onclick=async function(){
 if(!COMPANY||!SB){location.reload();return;}
 setSync(' · actualisation…');
 try{
  if(PENDING||SAVING){clearTimeout(SAVE_T);await flushSave();}
  const co=await SB.from('companies').select('*').eq('id',COMPANY.id).single();
  if(!co.error&&co.data){COMPANY=co.data;applyCompany();}
  if(COMPANY.suspended){renderHeader();showSuspended();return;}
  if(licDaysLeft()<=0){renderHeader();showExpired();return;}
  const cd=await SB.from('company_data').select('data,version').eq('company_id',COMPANY.id).single();
  if(cd.error)throw cd.error;
  hydrate(cd.data);
  renderHeader();if(R[CUR])R[CUR]();
  setSync(' · ✓ synchronisé');toast('Données actualisées');
 }catch(e){setSync(' · hors ligne');toast('Actualisation impossible — vérifiez la connexion');}
};

function authErr(e){
 const m=String((e&&e.message)||e||'');
 if(m.indexOf('Invalid login')>=0)return 'E-mail ou mot de passe incorrect.';
 if(m.indexOf('already registered')>=0)return 'Un compte existe déjà avec cet e-mail — connectez-vous.';
 if(m.indexOf('Email not confirmed')>=0)return 'E-mail non confirmé : cliquez le lien reçu par e-mail, puis reconnectez-vous.';
 if(m.indexOf('at least 6')>=0)return 'Mot de passe : 6 caractères minimum.';
 if(m.indexOf('invalid_key')>=0)return 'Clé invalide pour ce nom d’entreprise. Vérifiez la clé et l’orthographe exacte du nom.';
 if(m.indexOf('expired_key')>=0)return 'Cette clé est expirée. Contactez votre revendeur.';
 if(m.indexOf('already_member')>=0)return 'Ce collaborateur fait déjà partie de cette entreprise.';
 if(m.indexOf('already_has_company')>=0)return 'Ce compte est déjà rattaché à une entreprise.';
 if(m.indexOf('invalid_code')>=0)return 'Code d’invitation invalide, déjà utilisé ou expiré.';
 if(m.indexOf('not_owner')>=0)return 'Action réservée à l’administrateur.';
 if(m.indexOf('cannot_edit_owner')>=0)return 'Le compte administrateur ne peut pas être modifié.';
 if(m.indexOf('read_only_profile')>=0)return 'Votre profil est en lecture seule.';
 if(m.indexOf('suspended')>=0)return 'Licence suspendue — contactez votre fournisseur Trezo.';
 if(m.indexOf('Failed to fetch')>=0||m.indexOf('NetworkError')>=0)return 'Connexion Internet requise — vérifiez votre réseau.';
 return 'Erreur : '+m;
}
let AUMODE='mail';
function phoneToEmail(t){const d=String(t||'').replace(/\D/g,'');return d.length>=8?('tel'+d+'@trezo.local'):'';}
function identLbl(e){const m=/^tel(\d+)@trezo\.local$/.exec(String(e||''));return m?('+'+m[1]):(e||'');}
function authIdent(){
 const v=(document.getElementById('au-email')||{value:''}).value.trim();
 if(AUMODE==='tel')return phoneToEmail(v);
 return (v.indexOf('@')>0)?v.toLowerCase():'';
}
function auSetMode(m){
 AUMODE=m;
 const i=document.getElementById('au-email'),l=document.getElementById('au-lbl');
 document.getElementById('au-tab-m').classList.toggle('on',m==='mail');
 document.getElementById('au-tab-t').classList.toggle('on',m==='tel');
 if(m==='tel'){l.textContent='Numéro de téléphone (indicatif inclus)';i.type='tel';i.inputMode='tel';i.placeholder='Ex. : 221771234567';}
 else{l.textContent='Adresse e-mail';i.type='email';i.inputMode='email';i.placeholder='vous@exemple.com';}
 i.focus();
}

function auMsg(h){document.getElementById('au-msg').innerHTML=h;}
async function doSignup(){
 const em=authIdent(),p=document.getElementById('au-pass').value,p2=document.getElementById('au-pass2').value;
 if(!em){auMsg('<div class="msg-err">'+(AUMODE==='tel'?'Numéro de téléphone invalide (8 chiffres minimum, indicatif inclus).':'Adresse e-mail invalide.')+'</div>');return;}
 if(p.length<6){auMsg('<div class="msg-err">Mot de passe : 6 caractères minimum.</div>');return;}
 if(p!==p2){auMsg('<div class="msg-err">Les deux mots de passe ne correspondent pas.</div>');return;}
 auMsg('<div class="fine">Création du compte…</div>');
 const r=await SB.auth.signUp({email:em,password:p});
 if(r.error){auMsg('<div class="msg-err">'+esc(authErr(r.error))+'</div>');return;}
 if(!r.data.session){auMsg('<div class="msg-ok">Compte créé. Un e-mail de confirmation vous a été envoyé — cliquez le lien, puis revenez vous connecter.</div>');return;}
 SESSION=r.data.session;loadWorkspace();
}
async function doLogin(){
 const em=authIdent(),p=document.getElementById('au-pass').value;
 if(!em){auMsg('<div class="msg-err">Identifiant invalide.</div>');return;}
 if(!em||!p){auMsg('<div class="msg-err">E-mail et mot de passe requis.</div>');return;}
 auMsg('<div class="fine">Connexion…</div>');
 const r=await SB.auth.signInWithPassword({email:em,password:p});
 if(r.error){auMsg('<div class="msg-err">'+esc(authErr(r.error))+'</div>');return;}
 SESSION=r.data.session;loadWorkspace();
}
function applyCompany(){
 S.company.name=COMPANY.name;S.company.currency=COMPANY.currency;S.company.symbol=COMPANY.symbol;
 S.license={key:COMPANY.license_key||'',expiry:COMPANY.license_expiry,trial:!!COMPANY.is_trial};
}
function hydrate(cd){
 DOC_VERSION=cd.version;const d=cd.data||{};
 ['products','accounts','clients','charges','chgPays','exercises','stockMov','tx','employees','salPays','goals','invoices','journal'].forEach(k=>S[k]=Array.isArray(d[k])?d[k]:[]);
 S.settings=Object.assign({},DEFAULT.settings,d.settings||{});
 S.company.logo=d.logo||null;
 if(!S.accounts.length)S.accounts=[{id:'a_caisse',name:'Caisse'},{id:'a_banque',name:'Banque'},{id:'a_om',name:'Orange Money'},{id:'a_wave',name:'Wave'}];
}
async function loadWorkspace(){
 obShow('<div class="empty">Chargement de votre espace…</div>',1);
 const r=await SB.from('memberships').select('company_id,role,perms,companies(*)');
 if(r.error){obFail(r.error);return;}
 if(!r.data||!r.data.length){showCompanySetup();return;}
 MEMS=r.data;
 let mem=r.data[0];
 if(r.data.length>1){
  const saved=localStorage.getItem('trezo_company');
  const f=r.data.find(x=>x.company_id===saved);
  if(f)mem=f;else{showCompanyPicker();return;}
 }
 enterCompany(mem);
}
function showCompanyPicker(){
 obShow(`<h2>Choisissez une entreprise</h2>
 <p class="fine">Votre compte est rattaché à ${MEMS.length} entreprises. Sélectionnez celle sur laquelle travailler — vous pourrez changer à tout moment depuis Réglages.</p>
 ${MEMS.map((m,i)=>`<button class="btn btn-o btn-full mt" onclick="pickCompany(${i})">${esc(m.companies.name)}${m.role==='owner'?' — administrateur':''}</button>`).join('')}
 <button class="btn btn-full mt" style="color:var(--gris)" onclick="cloudSignOut()">Se déconnecter</button>`,1);
}
function pickCompany(i){
 const m=MEMS[i];if(!m)return;
 localStorage.setItem('trezo_company',m.company_id);
 enterCompany(m);
}
function switchCompany(){localStorage.removeItem('trezo_company');location.reload();}
async function enterCompany(mem){
 obShow('<div class="empty">Chargement de votre espace…</div>',1);
 COMPANY=mem.companies;MYROLE=mem.role||'owner';PERMS=mem.perms||null;applyCompany();
 if(COMPANY.suspended){renderHeader();showSuspended();return;}
 if(licDaysLeft()<=0){renderHeader();showExpired();return;}
 const cd=await SB.from('company_data').select('data,version').eq('company_id',COMPANY.id).single();
 if(cd.error){obFail(cd.error);return;}
 hydrate(cd.data);
 if(!S.settings.invPrefix){S.settings.invPrefix=initialsOf(COMPANY.name);}
 document.getElementById('ob').classList.remove('open');
 initApp();setSync(' · ✓ synchronisé');
}
function obFail(e){obShow('<h2>Connexion impossible</h2><p class="fine">'+esc(authErr(e))+'</p><button class="btn btn-p btn-full mt" onclick="loadWorkspace()">Réessayer</button><button class="btn btn-o btn-full mt" onclick="cloudSignOut()">Se déconnecter</button>',1);}

 const k=document.getElementById('ac-key').value.trim();
 if(!k){acMsg('<div class="msg-err">Entrez votre clé de licence.</div>');return;}
 acMsg('<div class="fine">Vérification de la clé…</div>');

function obLogo(inp){const f=inp.files[0];if(!f)return;resizeImg(f,url=>{OB.logo=url;document.getElementById('ob-logo-prev').src=url;});}
function resizeImg(file,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const s=Math.min(img.width,img.height);c.width=256;c.height=256;c.getContext('2d').drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,256,256);cb(c.toDataURL('image/png'));};img.src=e.target.result;};r.readAsDataURL(file);}
function obAddP(){
 const n=document.getElementById('ob-p-name').value.trim();
 if(!n){toast('Entrez le nom du produit');return;}
 OB.products.push({id:uid(),name:n,price:+document.getElementById('ob-p-price').value||0,cost:0,qty:+document.getElementById('ob-p-qty').value||0,alert:5});
 document.getElementById('ob-p-name').value='';document.getElementById('ob-p-price').value='';document.getElementById('ob-p-qty').value='';
 obRenderP();
}
function obRenderP(){document.getElementById('ob-plist').innerHTML=OB.products.map(p=>`<div class="row"><div class="rmain"><div class="rt">${esc(p.name)}</div><div class="rs">${fmt2(p.price,OB.symbol||S.company.symbol)} — stock : ${p.qty}</div></div><button class="btn btn-sm btn-d" onclick="obDelP('${p.id}')">Retirer</button></div>`).join('');}
function obDelP(id){OB.products=OB.products.filter(x=>x.id!==id);obRenderP();}
function obFinish(){
 S.products=OB.products;S.company.logo=OB.logo||null;
 S.accounts=[{id:'a_caisse',name:'Caisse'},{id:'a_banque',name:'Banque'},{id:'a_om',name:'Orange Money'},{id:'a_wave',name:'Wave'}];
 S.settings.invPrefix=initialsOf(S.company.name);

 save();

<script>
'use strict';
/* ===== Données agrégées ===== */
const txMonth=(m,t)=>S.tx.filter(x=>!x.xfer&&x.type===t&&x.date.slice(0,7)===m).reduce((a,x)=>a+x.amount,0);
const solde=()=>S.tx.reduce((a,x)=>a+(x.type==='in'?x.amount:-x.amount),0);
function last6(){const r=[],d=new Date();for(let i=5;i>=0;i--){const t=new Date(d.getFullYear(),d.getMonth()-i,1);r.push(t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0'));}return r;}
const accOf=x=>(x.acc&&S.accounts.some(a=>a.id===x.acc))?x.acc:(S.accounts[0]?S.accounts[0].id:null);
const accName=id=>{const a=S.accounts.find(a=>a.id===id);return a?a.name:'Caisse';};
const accBal=id=>S.tx.reduce((s,x)=>accOf(x)===id?s+(x.type==='in'?x.amount:-x.amount):s,0);
const stockVal=b=>S.products.reduce((a,p)=>a+p.qty*((b==='achat'?(p.cost||p.price):(p.price||p.cost))||0),0);
function goalFor(m){
 const g=S.goals.find(x=>x.month===m);
 if(g)return g.target;
 if(S.settings.objMode==='auto')return Math.round(stockVal(S.settings.objBase||'vente')*(+S.settings.objCoef||100)/100)||null;
 return null;
}
function txRow(x,del){
 const p=x.productId?S.products.find(q=>q.id===x.productId):null;
 return `<div class="row"><div class="dot ${x.type}">${x.type==='in'?'+':'−'}</div><div class="rmain"><div class="rt">${esc(x.desc||x.cat)}${p?' · '+esc(p.name)+(x.qty?' ×'+x.qty:''):''}</div><div class="rs">${dateLabel(x.date)} — ${esc(x.cat)} · ${esc(accName(accOf(x)))}${x.hist&&x.hist.length?' · <span style="color:var(--ambre-fonce);font-weight:700">modifié</span>':''}</div></div><div class="ramt ${x.type}">${x.type==='in'?'+':'−'} ${fmt(x.amount)}</div>${del?`<button class="btn btn-sm btn-o adm act-edit" onclick="editTx('${x.id}')">✎</button>`:''}${del&&x.type==='in'?((x.invId||x.ivId)?`<button class="btn btn-sm btn-o" onclick="invPreview('${x.invId||x.ivId}')">Facture</button>`:(x.advance?`<span class="chip chip-a" title="Avance client — imputable sur une future facture">Avance</span>`:`<button class="btn btn-sm btn-a adm" onclick="invoiceFromTx('${x.id}')">Facturer</button>`)):''}${del?`<button class="btn btn-sm btn-d adm act-del" onclick="delTx('${x.id}')">✕</button>`:''}</div>`;
}

/* ===== Tableau de bord ===== */
let CH={};
R.dash=function(){
 if(EXY!==new Date().getFullYear()){renderDashEx();return;}
 const m=curMonth(),enc=txMonth(m,'in'),dec=txMonth(m,'out');
 const goalT=goalFor(m);
 const low=S.products.filter(p=>p.qty<=p.alert&&p.alert>0);
 const recent=[...S.tx].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,5);
 const caM=S.tx.filter(x=>x.type==='in'&&x.cat==='Ventes'&&x.date.slice(0,7)===m).reduce((a,x)=>a+x.amount,0);
 const caY=S.tx.filter(x=>x.type==='in'&&x.cat==='Ventes'&&x.date.slice(0,4)===String(new Date().getFullYear())).reduce((a,x)=>a+x.amount,0);
 document.getElementById('v-dash').innerHTML=`
 <div class="card hero">
  <div class="lbl">Solde de trésorerie</div>
  <div class="big">${fmt(solde())}</div>
  <div style="font-size:.85rem;opacity:.85">${monthLabel(m)} : <b>+${NF.format(enc)}</b> / <b>−${NF.format(dec)}</b> ${S.company.symbol}</div>
  <div class="hbars"><i style="height:26px;background:var(--ambre)"></i><i style="height:46px;background:var(--menthe)"></i><i style="height:66px;background:#fff"></i></div>
 </div>
 <div class="kgrid">
  <div class="kpi in"><div class="lbl">Encaissements (mois)</div><div class="val">${fmt(enc)}</div></div>
  <div class="kpi out"><div class="lbl">Décaissements (mois)</div><div class="val">${fmt(dec)}</div></div>
  <div class="kpi"><div class="lbl">Résultat (mois)</div><div class="val" style="color:${enc-dec>=0?'var(--vert)':'var(--rouge)'}">${fmt(enc-dec)}</div></div>
  <div class="kpi"><div class="lbl">Objectif du mois</div><div class="val">${goalT?Math.round(enc/goalT*100)+' %':'—'}</div>${goalT?`<div class="pbar"><i class="${enc>=goalT?'done':''}" style="width:${Math.min(100,enc/goalT*100)}%"></i></div><div class="fine">${NF.format(enc)} / ${NF.format(goalT)} · reste ${NF.format(Math.max(0,goalT-enc))}</div>`:'<div class="fine">Définir dans Objectifs</div>'}</div>
  <div class="kpi in"><div class="lbl">Chiffre d’affaires (mois)</div><div class="val">${fmt(caM)}</div></div>
  <div class="kpi"><div class="lbl">Chiffre d’affaires ${new Date().getFullYear()}</div><div class="val">${fmt(caY)}</div></div>
 </div>
 ${(function(){const py=new Date().getFullYear()-1,pe=exOf(py);return (pe&&pe.status==='closed')?`<div class="fine" style="margin:-.2rem 0 .8rem">Exercice ${new Date().getFullYear()} en cours · Report à nouveau ${py} : <b>${fmt(pe.ran)}</b></div>`:'';})()}
 <div class="card"><h3>Soldes par compte</h3><div class="kgrid" style="margin-bottom:0">${S.accounts.map(a=>`<div class="kpi"><div class="lbl">${esc(a.name)}</div><div class="val" style="font-size:1.02rem">${fmt(accBal(a.id))}</div></div>`).join('')}</div></div>
 ${low.length?`<div class="card" style="border-color:var(--rouge)"><h3 style="color:var(--rouge)">⚠ Stock bas</h3>${low.map(p=>`<div class="row"><div class="rmain"><div class="rt">${esc(p.name)}</div></div><span class="chip chip-r">${p.qty} restant(s)</span></div>`).join('')}</div>`:''}
 <div class="grid2" style="margin-bottom:1rem"><button class="btn btn-o" onclick="monthlyReport()">Rapport du mois (PDF)</button><button class="btn btn-o" onclick="exportExcel()">Export Excel</button></div>
 <div class="charts">
  <div class="card"><h3>Flux des 6 derniers mois</h3><canvas id="ch-line" height="230"></canvas></div>
  <div class="card"><h3>Décaissements du mois</h3><canvas id="ch-pie" height="230"></canvas><div id="pie-empty"></div></div>
  <div class="card"><h3>Chiffre d’affaires (12 mois)</h3><canvas id="ch-ca" height="230"></canvas></div>
  <div class="card"><h3>Meilleurs produits — chiffre d’affaires</h3><canvas id="ch-prod" height="230"></canvas><div id="prod-empty"></div></div>
 </div>
 <div class="card"><h3>Dernières opérations</h3>${recent.length?recent.map(x=>txRow(x,false)).join(''):'<div class="empty">Aucune opération. Ajoutez vos premiers flux dans l’onglet Flux.</div>'}</div>`;
 drawCharts(m);
};
function drawCharts(m){
 if(!window.Chart)return;
 Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={};
 const ms=last6();
 CH.line=new Chart(document.getElementById('ch-line'),{type:'bar',data:{labels:ms.map(monthLabel),datasets:[
  {label:'Encaissements',data:ms.map(x=>txMonth(x,'in')),backgroundColor:'#0E5A45',borderRadius:5},
  {label:'Décaissements',data:ms.map(x=>txMonth(x,'out')),backgroundColor:'#F2B33D',borderRadius:5}]},
  options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>NF.format(v)}}}}});
 const cats={};S.tx.filter(x=>x.type==='out'&&x.date.slice(0,7)===m).forEach(x=>cats[x.cat]=(cats[x.cat]||0)+x.amount);
 const ks=Object.keys(cats);
 if(ks.length){CH.pie=new Chart(document.getElementById('ch-pie'),{type:'doughnut',data:{labels:ks,datasets:[{data:ks.map(k=>cats[k]),backgroundColor:['#0E5A45','#F2B33D','#7FC8A9','#C0492F','#5E6B64','#0A3D2F','#D9A05B','#8FBF9F','#7A5C3E']}]},options:{plugins:{legend:{position:'bottom'}}}});}
 else document.getElementById('pie-empty').innerHTML='<div class="empty">Aucun décaissement ce mois-ci.</div>';
 const ms12=[];const _now=new Date();
 for(let i=11;i>=0;i--){const d=new Date(_now.getFullYear(),_now.getMonth()-i,1);ms12.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));}
 CH.ca=new Chart(document.getElementById('ch-ca'),{type:'line',data:{labels:ms12.map(x=>monthLabel(x).split(' ')[0]),datasets:[{label:'Chiffre d’affaires',data:ms12.map(x=>S.tx.filter(t=>t.type==='in'&&t.cat==='Ventes'&&t.date.slice(0,7)===x).reduce((a,t)=>a+t.amount,0)),borderColor:'#0E5A45',backgroundColor:'rgba(14,90,69,.12)',fill:true,tension:.3,pointRadius:3}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>NF.format(v)}}}}});
 const caP={};
 S.tx.filter(t=>t.type==='in'&&t.productId).forEach(t=>{const p=S.products.find(q=>q.id===t.productId);const nm=p?p.name:'(retiré)';caP[nm]=(caP[nm]||0)+t.amount;});
 S.invoices.filter(iv=>!iv.proforma&&!iv.cancelled).forEach(iv=>iv.lines.forEach(l=>{if(l.productId){const p=S.products.find(q=>q.id===l.productId);const nm=p?p.name:'(retiré)';caP[nm]=(caP[nm]||0)+l.qty*l.pu;}}));
 const pk=Object.keys(caP).sort((a,b)=>caP[b]-caP[a]).slice(0,6);
 if(pk.length){CH.prod=new Chart(document.getElementById('ch-prod'),{type:'bar',data:{labels:pk,datasets:[{label:'CA',data:pk.map(k=>caP[k]),backgroundColor:'#F2B33D',borderRadius:5}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>NF.format(v)}}}}});}
 else document.getElementById('prod-empty').innerHTML='<div class="empty">Aucune vente de produit pour l’instant — les ventes en caisse et les factures alimenteront ce graphique.</div>';
}

/* ===== Flux ===== */
let FLUX='in',FLUX_Q='',FLUX_M='';
R.flux=function(){
 const cats=FLUX==='in'?CAT_IN:CAT_OUT;
 document.getElementById('v-flux').innerHTML=`
 <div class="tabs"><button class="${FLUX==='in'?'on':''}" onclick="FLUX='in';R.flux()">Encaissements</button><button class="t-out ${FLUX==='out'?'on':''}" onclick="FLUX='out';R.flux()">Décaissements</button></div>
 <div class="grid2 adm" style="margin-bottom:1rem"><button class="btn btn-o" onclick="importTpl()">Importer un template</button><button class="btn btn-o" onclick="downloadTpl()">Modèle .xlsx</button></div>
 <button class="btn btn-o btn-full adm" style="margin-bottom:1rem" onclick="xferOpen()">⇄ Transfert entre comptes</button>
 <button class="btn btn-o btn-full" style="margin-bottom:1rem" onclick="fluxExportOpen()">⬇ Exporter les flux (Excel · CSV · PDF)</button>
 <div class="card adm">
  <h3>${FLUX==='in'?'Nouvel encaissement':'Nouveau décaissement'}</h3>
  ${FLUX==='in'&&S.products.length?`<label>Produit vendu (optionnel — met le stock à jour)</label><select id="f-prod" onchange="fluxProd()"><option value="">— Saisie libre —</option>${S.products.map(p=>`<option value="${p.id}">${esc(p.name)} (${NF.format(p.price)} ${S.company.symbol} · stock ${p.qty})</option>`).join('')}</select><div id="f-qty-wrap" style="display:none"><label>Quantité</label><input id="f-qty" type="number" min="1" value="1" oninput="fluxProd()"></div>`:''}
  <div class="grid2"><div><label>Montant (${S.company.symbol})</label><input id="f-amt" type="number" min="0" inputmode="numeric"></div><div><label>Date</label><input id="f-date" type="date" value="${defDate()}"></div></div>
  <label>Catégorie</label><select id="f-cat">${cats.map(c=>`<option>${c}</option>`).join('')}</select>
  <label>Compte / mode</label><select id="f-acc">${S.accounts.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}</select>
  ${FLUX==='in'?`<label>Client (obligatoire — créé automatiquement s’il n’existe pas)</label><input id="f-cli" list="dl-cli2" placeholder="Nom du client" oninput="fluxCliMatch()"><datalist id="dl-cli2">${S.clients.map(c=>`<option value="${esc(cliFull(c))}">`).join('')}</datalist><div id="f-cli-hint" class="fine"></div><div id="f-inv-wrap"></div>`:''}
  <label>Description (optionnel)</label><input id="f-desc" placeholder="${FLUX==='in'?'Ex. : Vente comptoir':'Ex. : Facture électricité juin'}">
  <button class="btn ${FLUX==='in'?'btn-p':'btn-d'} btn-full mt" onclick="addTx()">Enregistrer</button>
 </div>
 <div class="card"><h3>Historique <span id="flux-count" style="font-weight:600;color:var(--gris);font-size:.85rem"></span></h3>
  <div class="grid2" style="margin:.6rem 0 .8rem"><input placeholder="Rechercher…" value="${esc(FLUX_Q)}" oninput="FLUX_Q=this.value;renderFluxList()"><input type="month" value="${FLUX_M}" onchange="FLUX_M=this.value;renderFluxList()"></div>
  <div id="flux-list"></div></div>`;
 renderFluxList();
};
function renderFluxList(){
 const el=document.getElementById('flux-list');if(!el)return;
 const q=FLUX_Q.trim().toLowerCase();
 let list=S.tx.filter(x=>x.type===FLUX&&exYFilter(x.date));
 if(FLUX_M)list=list.filter(x=>x.date.slice(0,7)===FLUX_M);
 if(q)list=list.filter(x=>((x.desc||'')+' '+x.cat+' '+String(x.amount)).toLowerCase().indexOf(q)>=0);
 list.sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
 const tot=list.reduce((a,x)=>a+x.amount,0);
 document.getElementById('flux-count').textContent='('+list.length+' op. · '+fmt(tot)+')';
 el.innerHTML=list.length
  ?list.slice(0,200).map(x=>txRow(x,true)).join('')+(list.length>200?'<div class="empty">… '+(list.length-200)+' opérations plus anciennes — affinez la recherche.</div>':'')
  :'<div class="empty">'+((q||FLUX_M)?'Aucune opération ne correspond à ces filtres.':'Aucune opération pour le moment.')+'</div>';
}
function fluxProd(){
 const sel=document.getElementById('f-prod');if(!sel)return;
 const w=document.getElementById('f-qty-wrap');
 const p=S.products.find(x=>x.id===sel.value);
 if(!p){w.style.display='none';return;}
 w.style.display='block';
 const q=+document.getElementById('f-qty').value||1;
 document.getElementById('f-amt').value=p.price*q;
 document.getElementById('f-cat').value='Ventes';
}
function addTx(){
 const amt=+document.getElementById('f-amt').value;
 if(!amt||amt<=0){toast('Entrez un montant valide');return;}
 if(exGuard(document.getElementById('f-date').value||todayStr()))return;
 let cliId=null,ADVFLAG=false;
 if(FLUX==='in'){
  const cliName=(document.getElementById('f-cli')||{value:''}).value.trim();
  if(!cliName){toast('Sélectionnez ou saisissez le client concerné');return;}
  let c=S.clients.find(x=>cliFull(x).toLowerCase()===cliName.toLowerCase());
  if(!c){c={id:uid(),name:cliName,firstname:'',phone:'',address:''};S.clients.push(c);log('Client créé automatiquement depuis un encaissement : '+cliName);toast('Nouveau client « '+cliName+' » ajouté à la base');}
  cliId=c.id;
  const ivSel=document.getElementById('f-inv');
  const ivVal=ivSel?ivSel.value:'';
  if(ivVal&&ivVal!=='ADV'){payInvoiceFromFlux(ivVal,amt,document.getElementById('f-date').value||todayStr(),document.getElementById('f-acc').value,cliId);return;}
  const hasProd=!!((document.getElementById('f-prod')||{}).value);
  const openInv=S.invoices.filter(i=>i.clientId===cliId&&!i.proforma&&!i.cancelled&&invStatus(i)!=='paid');
  if(!hasProd&&openInv.length&&ivVal!=='ADV'){toast('Ce client a des factures non soldées — sélectionnez la facture à régler, ou choisissez « Avance client »');return;}
  if(!hasProd){
   ADVFLAG=true;
   const fc=document.getElementById('f-cat');if(fc)fc.value='Avance client';
   const fd=document.getElementById('f-desc');
   if(fd&&!fd.value.trim())fd.value='Avance reçue — '+cliName;
  }
 }
 const sel=document.getElementById('f-prod');
 let productId=null,qty=null;
 if(FLUX==='in'&&sel&&sel.value){
  const p=S.products.find(x=>x.id===sel.value);
  qty=+(document.getElementById('f-qty')||{value:1}).value||1;
  if(p){if(qty>p.qty&&!confirm('Stock insuffisant ('+p.qty+' dispo). Enregistrer quand même ?'))return;productId=p.id;p.qty=Math.max(0,p.qty-qty);}
 }
 const desc=document.getElementById('f-desc').value.trim();
 S.tx.push({id:uid(),type:FLUX,amount:amt,cat:document.getElementById('f-cat').value,desc,date:document.getElementById('f-date').value||todayStr(),acc:document.getElementById('f-acc').value,clientId:cliId,advance:ADVFLAG||undefined,productId,qty});
 if(productId){const pp=S.products.find(x=>x.id===productId);smov(productId,'out',qty,pp?(pp.price||0):0,'Vente'+(desc?' — '+desc:''));}
 log((FLUX==='in'?'Encaissement':'Décaissement')+' de '+fmt(amt)+(desc?' — '+desc:'')+(productId?' (stock mis à jour)':''));
 save();R.flux();toast('Opération enregistrée');
}
function delTx(id){
 const t=S.tx.find(x=>x.id===id);if(!t)return;
 if(exGuard(t.date))return;
 if(t.xfer){
  if(!confirm('Supprimer ce transfert de '+fmt(t.amount)+' ?\n\nLes DEUX écritures (sortie du compte source et entrée sur le compte destination) seront supprimées pour garder les soldes justes.'))return;
  let twin=null;
  if(t.xid)twin=S.tx.find(x=>x.id!==t.id&&x.xid===t.xid);
  if(!twin)twin=S.tx.find(x=>x.id!==t.id&&x.xfer&&x.date===t.date&&x.amount===t.amount&&x.desc===t.desc&&x.type!==t.type);
  S.tx=S.tx.filter(x=>x.id!==t.id&&(!twin||x.id!==twin.id));
  log('Transfert supprimé : '+t.desc+' — '+fmt(t.amount)+(twin?' (2 écritures)':' (écriture jumelle introuvable)'));
  save();if(R[CUR])R[CUR]();toast(twin?'Transfert supprimé — les deux écritures ont été retirées':'Écriture supprimée — jumelle introuvable, vérifiez les soldes');
  return;
 }
 if(!confirm('Supprimer cette opération de '+fmt(t.amount)+' ?'))return;
 if(t.productId&&t.type==='in'&&t.qty){const p=S.products.find(q=>q.id===t.productId);if(p)p.qty+=t.qty;}
 S.tx=S.tx.filter(x=>x.id!==id);
 log('Opération supprimée ('+fmt(t.amount)+')');
 save();if(R[CUR])R[CUR]();
}
function editTx(id){
 const t=S.tx.find(x=>x.id===id);if(!t)return;
 const cats=t.type==='in'?CAT_IN:CAT_OUT;
 const p=t.productId?S.products.find(q=>q.id===t.productId):null;
 openModal(`<h2>Modifier l’opération <button class="close" onclick="closeSheet('sheet-modal')">×</button></h2>
 ${p?`<p class="fine">Liée au produit <b>${esc(p.name)}</b> — modifier la quantité ajustera automatiquement le stock.</p><label>Quantité</label><input id="et-qty" type="number" min="1" value="${t.qty||1}">`:''}
 <div class="grid2"><div><label>Montant (${S.company.symbol})</label><input id="et-amt" type="number" min="0" value="${t.amount}"></div><div><label>Date</label><input id="et-date" type="date" value="${t.date}"></div></div>
 <label>Catégorie</label><select id="et-cat">${cats.map(c=>`<option ${c===t.cat?'selected':''}>${c}</option>`).join('')}${cats.indexOf(t.cat)<0?`<option selected>${esc(t.cat)}</option>`:''}</select>

function saveTxEdit(id){
 const t=S.tx.find(x=>x.id===id);if(!t)return;
 if(exGuard(t.date))return;
 const amt=+document.getElementById('et-amt').value;
 const date=document.getElementById('et-date').value||t.date;
 const cat=document.getElementById('et-cat').value;
 const desc=document.getElementById('et-desc').value.trim();
 const nacc=document.getElementById('et-acc').value;
 if(!amt||amt<=0){toast('Montant invalide');return;}
 const ch=[];
 if(t.productId){
  const p=S.products.find(q=>q.id===t.productId);
  const nq=+((document.getElementById('et-qty')||{}).value)||t.qty||1;
  if(p&&nq!==(t.qty||1)){
   const delta=nq-(t.qty||1);
   if(delta>0&&p.qty<delta&&!confirm('Stock insuffisant ('+p.qty+' disponibles). Continuer quand même ?'))return;
   p.qty=Math.max(0,p.qty-delta);
   if(delta)smov(p.id,delta>0?'out':'in',Math.abs(delta),p.price||0,'Correction d’opération');
   ch.push('Quantité : '+(t.qty||1)+' → '+nq+' (stock ajusté)');
   t.qty=nq;
  }
 }
 if(amt!==t.amount)ch.push('Montant : '+fmt(t.amount)+' → '+fmt(amt));
 if(date!==t.date)ch.push('Date : '+t.date+' → '+date);
 if(cat!==t.cat)ch.push('Catégorie : '+t.cat+' → '+cat);
 if(nacc!==accOf(t))ch.push('Compte : '+accName(accOf(t))+' → '+accName(nacc));
 if(desc!==(t.desc||''))ch.push('Description modifiée');
 if(!ch.length){closeSheet('sheet-modal');return;}
 t.amount=amt;t.date=date;t.cat=cat;t.desc=desc;t.acc=nacc;
 t.hist=Array.isArray(t.hist)?t.hist:[];
 t.hist.unshift({d:new Date().toISOString(),by:(SESSION&&SESSION.user&&SESSION.user.email)||'',txt:ch.join(' · ')});
 if(t.hist.length>20)t.hist.length=20;
 log('Opération modifiée — '+ch.join(' · '));
 save();closeSheet('sheet-modal');if(R[CUR])R[CUR]();toast('Opération modifiée');
}

let SALTAB='sal';
const PERIODS=[['m','Mensuelle',1],['t','Trimestrielle',3],['s','Semestrielle',6],['a','Annuelle',12]];
function perLbl(p){const x=PERIODS.find(y=>y[0]===p);return x?x[1]:'Mensuelle';}
function perMonths(p){const x=PERIODS.find(y=>y[0]===p);return x?x[2]:1;}
function chgPeriodKey(c,d){
 d=d||new Date();
 const n=perMonths(c.per||'m');
 const start=Math.floor(d.getMonth()/n)*n;
 return d.getFullYear()+'-'+String(start+1).padStart(2,'0');
}
function chgPaid(c){const k=chgPeriodKey(c);return S.chgPays.find(p=>p.chargeId===c.id&&p.period===k);}
function chgMonthly(){return S.charges.reduce((a,c)=>a+(c.amount||0)/perMonths(c.per||'m'),0);}

 document.getElementById('v-sal').innerHTML=`

 <div class="kgrid">

 }).join('')||'<div class="empty">Aucune charge fixe. Ajoutez le loyer, l’eau, l’électricité, Internet, les assurances…</div>'}</div>`;
}

function stkImport(){

 <p class="fine">Fichier <b>.xlsx</b> ou <b>.csv</b> avec les colonnes : <b>Produit</b> (obligatoire), <b>Quantité</b>, <b>Prix d\u2019achat</b>, <b>Prix de vente</b>, <b>Seuil d\u2019alerte</b>. Un produit dont le nom existe déjà sera <b>mis à jour</b> — aucun doublon n\u2019est créé. Rien n\u2019est enregistré avant votre validation de l\u2019aperçu.</p>
 <input type="file" accept=".xlsx,.xls,.csv" onchange="stkHandle(this)">
 <div id="stk-prev"></div>`);
}
function stkHandle(inp){
 const f=inp.files[0];if(!f)return;
 if(!window.XLSX){toast('Module Excel non chargé — connectez-vous une fois à Internet');return;}
 const res=document.getElementById('stk-prev');
 res.innerHTML='<div class="fine mt">Analyse du fichier…</div>';
 const r=new FileReader();
 r.onload=e=>{
  try{
   const wb=XLSX.read(e.target.result,{type:'array'});
   const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
   if(!rows.length){res.innerHTML='<div class="msg-err">Fichier vide ou illisible.</div>';return;}
   if(rows.length>3000){res.innerHTML='<div class="msg-err">Maximum 3 000 lignes.</div>';return;}
   const map={};
   Object.keys(rows[0]).forEach(k=>{const n=stripAcc(k).toLowerCase().trim();
    if(n.indexOf('produit')===0||n==='nom'||n.indexOf('designation')===0)map.name=k;
    else if(n.indexOf('quantite')===0||n==='qte'||n==='stock')map.qty=k;
    else if(n.indexOf('achat')>=0||n==='cout')map.cost=k;
    else if(n.indexOf('vente')>=0)map.price=k;
    else if(n.indexOf('seuil')===0||n.indexOf('alerte')>=0)map.alert=k;});
   if(!map.name){res.innerHTML='<div class="msg-err">Structure invalide — colonne <b>Produit</b> introuvable. Téléchargez le modèle.</div>';return;}
   IMPST={rows:[],neu:0,upd:0,err:0};
   const seen={};
   rows.forEach((row,i)=>{
    const name=String(row[map.name]).trim();
    const qty=map.qty?+String(row[map.qty]).replace(/[\s\u202F\u00A0]/g,''):0;
    const cost=map.cost?+String(row[map.cost]).replace(/[\s\u202F\u00A0]/g,''):0;
    const price=map.price?+String(row[map.price]).replace(/[\s\u202F\u00A0]/g,''):0;
    const alert=map.alert?+String(row[map.alert]).replace(/[\s\u202F\u00A0]/g,''):0;
    let st='new',motif='';
    const kn=stripAcc(name).toLowerCase();
    if(!name){st='err';motif='nom manquant';}
    else if(isNaN(qty)||qty<0){st='err';motif='quantité invalide';}
    else if(seen[kn]){st='err';motif='doublon dans le fichier (déjà ligne '+seen[kn]+')';}
    else{seen[kn]=i+2;if(S.products.some(p=>stripAcc(p.name).toLowerCase()===kn))st='upd';}
    if(st==='err')IMPST.err++;else if(st==='upd')IMPST.upd++;else IMPST.neu++;
    IMPST.rows.push({name:name,qty:isNaN(qty)?0:qty,cost:isNaN(cost)?0:cost,price:isNaN(price)?0:price,alert:isNaN(alert)?0:alert,st:st,motif:motif,line:i+2});
   });
   const ok=IMPST.neu+IMPST.upd;
   res.innerHTML='<div class="fine" style="margin-top:.7rem"><b>'+IMPST.neu+'</b> nouveau(x) · <b>'+IMPST.upd+'</b> mise(s) à jour · <b style="color:var(--rouge)">'+IMPST.err+'</b> erreur(s)</div>'
    +'<div class="twrap" style="max-height:230px;overflow:auto;margin-top:.5rem"><table><tr><th>Ligne</th><th>Produit</th><th>Qté</th><th>Statut</th></tr>'
    +IMPST.rows.slice(0,300).map(x=>'<tr><td>'+x.line+'</td><td>'+esc(x.name||'—')+'</td><td>'+x.qty+'</td><td>'+(x.st==='err'?'<span class="chip chip-r">'+esc(x.motif)+'</span>':x.st==='upd'?'<span class="chip chip-a">Mise à jour</span>':'<span class="chip chip-g">Nouveau</span>')+'</td></tr>').join('')+'</table></div>'
    +(ok?'<button class="btn btn-p btn-full mt" onclick="stkApply()">Valider l\u2019import — '+ok+' produit(s)</button>':'');
  }catch(err2){res.innerHTML='<div class="msg-err">Impossible de lire ce fichier. Vérifiez qu\u2019il s\u2019agit bien d\u2019un .xlsx ou .csv.</div>';}
 };
 r.readAsArrayBuffer(f);
}
function stkApply(){

function invTotals(iv){
 const htBrut=iv.lines.reduce((a,l)=>a+l.qty*l.pu,0);
 let remise=0;
 if(iv.disc&&iv.disc.v>0)remise=iv.disc.t==='pct'?htBrut*Math.min(100,iv.disc.v)/100:Math.min(iv.disc.v,htBrut);
 const ht=htBrut-remise,tva=ht*(iv.tva||0)/100;
 return{htBrut,remise,ht,tva,ttc:ht+tva};
}
function invPaid(iv){if(Array.isArray(iv.pays))return iv.pays.reduce((a,p)=>a+p.amount,0);return iv.paid?invTotals(iv).ttc:0;}
function invStatus(iv){if(iv.proforma)return'pro';if(iv.cancelled)return'cancel';const t=invTotals(iv).ttc,r=invPaid(iv);if(r>=t-0.5)return'paid';if(r>0)return'part';return'unpaid';}

function factList(){
 const q=FQ.trim().toLowerCase();
 let list=S.invoices.filter(iv=>{
  if(!exYFilter(iv.date))return false;
  if(FFILT!=='all'&&invStatus(iv)!==FFILT)return false;
  if(FMM&&iv.date.slice(0,7)!==FMM)return false;
  if(FD1&&iv.date<FD1)return false;
  if(FD2&&iv.date>FD2)return false;
  const _ttc=invTotals(iv).ttc;
  if(FMIN!==''&&_ttc<+FMIN)return false;
  if(FMAX!==''&&_ttc>+FMAX)return false;
  if(q&&(iv.client+' '+iv.num).toLowerCase().indexOf(q)<0)return false;
  return true;
 });
 list.sort((a,b)=>{
  let va,vb;
  if(FSORT==='ttc'){va=invTotals(a).ttc;vb=invTotals(b).ttc;}
  else if(FSORT==='solde'){va=invTotals(a).ttc-invPaid(a);vb=invTotals(b).ttc-invPaid(b);}

  else if(FSORT==='date'){va=a.date;vb=b.date;}

 });
 return list;

 }).join('');
 document.getElementById('fact-tot').innerHTML='<b>'+list.length+'</b> facture(s) — Total TTC : <b>'+fmt(tT)+'</b> · Réglé : <b>'+fmt(tR)+'</b> · Reste dû : <b style="color:'+(tT-tR>0.5?'var(--rouge)':'var(--vert)')+'">'+fmt(Math.max(0,tT-tR))+'</b>';

}

function saveInvoice(kind){

 if(!client){toast('Nom du client requis');return;}
 let cli=S.clients.find(x=>cliFull(x).toLowerCase()===client.toLowerCase());
 const telv=document.getElementById('iv-tel').value.trim();

 if(!cli){cli={id:uid(),name:client,firstname:'',phone:telv,address:addrv};S.clients.push(cli);log('Client créé automatiquement depuis la facturation : '+client);toast('Nouveau client « '+client+' » ajouté à la base');}
 else{if(telv&&!cli.phone)cli.phone=telv;if(addrv&&!cli.address)cli.address=addrv;}
 const lines=INV_LINES.filter(l=>l.label.trim()&&l.qty>0).map(l=>({label:l.label.trim(),qty:l.qty,pu:l.pu,productId:l.productId||null}));

 if(!fromTx&&!proforma){for(const l of lines){if(l.productId){const p=S.products.find(x=>x.id===l.productId);if(p&&p.qty<l.qty){toast('Stock insuffisant pour '+p.name+' ('+p.qty+' dispo)');return;}}}}
 const pfx=S.settings.invPrefix||initialsOf(S.company.name);
 let num;

 else{S.settings.invSeq++;num=pfx+'-'+new Date().getFullYear()+'-'+String(S.settings.invSeq).padStart(4,'0');}

 if(fromTx)iv.pays=[{d:iv.date,amount:invTotals(iv).ttc}];
 if(!fromTx&&!proforma)lines.forEach(l=>{if(l.productId){const p=S.products.find(x=>x.id===l.productId);if(p){p.qty=Math.max(0,p.qty-l.qty);smov(p.id,'out',l.qty,l.pu||0,'Facture '+num);}}});

 else{log((proforma?'Pro forma créée : ':'Facture créée : ')+num+' — '+client+' ('+fmt(invTotals(iv).ttc)+')');}
 const wasFromTx=!!fromTx;
 INV_FROM_TX=null;INV_DATE=null;
 save();closeSheet('sheet-modal');if(R[CUR])R[CUR]();toast((proforma?'Pro forma ':'Facture ')+num+(wasFromTx?' générée':' créée'));

function invPayDo(id){
 const iv=S.invoices.find(x=>x.id===id);if(!iv)return;
 const t=invTotals(iv),sol=Math.max(0,t.ttc-invPaid(iv));
 const amt=+document.getElementById('ip-amt').value;
 const d=document.getElementById('ip-date').value||todayStr();
 if(exGuard(d))return;
 const src=((document.getElementById('ip-src')||{}).value)||'acc';
 const pacc=document.getElementById('ip-acc').value;
 if(src!=='adv'&&!pacc){toast('Choisissez le mode d’encaissement');return;}
 if(!amt||amt<=0){toast('Montant invalide');return;}
 if(amt>sol+0.5){toast('Le montant dépasse le reste dû ('+fmt(sol)+')');return;}
 iv.pays=Array.isArray(iv.pays)?iv.pays:(iv.paid?[{d:iv.date,amount:t.ttc}]:[]);
 if(src==='adv'){
  const bal=advBalance(iv.clientId);
  if(amt>bal+0.5){toast('Avance disponible insuffisante ('+fmt(bal)+')');return;}
  let rest=amt;
  S.tx.filter(x=>x.advance&&x.type==='in'&&x.clientId===iv.clientId).sort((a,b)=>a.date<b.date?-1:1).forEach(x=>{
   if(rest<=0)return;
   const dispo=x.amount-(x.advUsed||0);
   if(dispo<=0)return;
   const take=Math.min(dispo,rest);
   x.advUsed=(x.advUsed||0)+take;rest-=take;
  });
  iv.pays.push({d:d,amount:amt,adv:true});
  iv.paid=invPaid(iv)>=t.ttc-0.5;
  log('Avance client imputée sur la facture '+iv.num+' : '+fmt(amt)+(iv.paid?' — facture soldée':''));
 }else{
  iv.pays.push({d:d,amount:amt,acc:pacc});
  iv.paid=invPaid(iv)>=t.ttc-0.5;
  S.tx.push({id:uid(),type:'in',amount:amt,cat:'Ventes',desc:'Facture '+iv.num+' — '+iv.client+(iv.paid?'':' (acompte)'),date:d,acc:pacc,clientId:iv.clientId||null,ivId:iv.id,productId:null,qty:null});
 }
 log('Encaissement facture '+iv.num+' ('+accName(pacc)+') : '+fmt(amt)+(iv.paid?' — facture soldée':' — reste dû '+fmt(Math.max(0,t.ttc-invPaid(iv)))));
 save();closeSheet('sheet-modal');if(R[CUR])R[CUR]();toast(iv.paid?'Facture soldée':'Acompte enregistré');
}
function invDel(id){
 const iv=S.invoices.find(x=>x.id===id);if(!iv)return;
 if(exGuard(iv.date))return;
 if(invPaid(iv)>0){toast('Suppression impossible : des règlements sont enregistrés sur cette facture');return;}
 if(!confirm('Supprimer la facture '+iv.num+' ? Les quantités seront remises en stock.'))return;
 iv.lines.forEach(l=>{if(l.productId){const p=S.products.find(x=>x.id===l.productId);if(p){p.qty+=l.qty;smov(p.id,'in',l.qty,l.pu||0,'Suppression facture '+iv.num);}}});
 S.invoices=S.invoices.filter(x=>x.id!==id);
 log('Facture supprimée : '+iv.num+' — '+iv.client+' ('+fmt(invTotals(iv).ttc)+')');save();R.fact();toast('Facture supprimée');
}
function invCancelOpen(id){
 const iv=S.invoices.find(x=>x.id===id);if(!iv||iv.cancelled)return;
 openModal(`<h2>Annuler — ${esc(iv.num)} <button class="close" onclick="closeSheet('sheet-modal')">×</button></h2>
 <p class="fine">Une facture réglée (totalement ou en partie) ne peut pas être supprimée : elle sera marquée <b>Annulée</b> et exclue des totaux, mais restera visible pour la traçabilité. Les encaissements déjà enregistrés restent dans la trésorerie — créez un décaissement de remboursement si vous rendez l’argent.</p>
 <label>Motif (optionnel)</label><input id="cx-reason" placeholder="Ex. : erreur de saisie, commande annulée">
 <button class="btn btn-d btn-full mt" onclick="invCancelDo('${iv.id}')">Confirmer l’annulation</button>`);
}
function invCancelDo(id){

 const reason=document.getElementById('cx-reason').value.trim();
 iv.cancelled={d:new Date().toISOString(),by:(SESSION&&SESSION.user)?SESSION.user.email:'',reason:reason};
 log('Facture annulée : '+iv.num+' — '+iv.client+' ('+fmt(invTotals(iv).ttc)+')'+(reason?' · Motif : '+reason:''));
 save();closeSheet('sheet-modal');if(R[CUR])R[CUR]();toast('Facture annulée');
}
function proToDef(id){
 const iv=S.invoices.find(x=>x.id===id);if(!iv||!iv.proforma)return;
 for(const l of iv.lines){if(l.productId){const p=S.products.find(x=>x.id===l.productId);if(p&&p.qty<l.qty){toast('Stock insuffisant pour '+p.name+' ('+p.qty+' dispo)');return;}}}
 if(!confirm('Transformer '+iv.num+' en facture définitive ? Un numéro définitif sera attribué et le stock sera déduit.'))return;
 iv.lines.forEach(l=>{if(l.productId){const p=S.products.find(x=>x.id===l.productId);if(p){p.qty=Math.max(0,p.qty-l.qty);smov(p.id,'out',l.qty,l.pu||0,'Facture définitive (ex-'+iv.num+')');}}});
 const pfx=S.settings.invPrefix||initialsOf(S.company.name);
 S.settings.invSeq++;
 const old=iv.num;
 iv.num=pfx+'-'+new Date().getFullYear()+'-'+String(S.settings.invSeq).padStart(4,'0');
 iv.proforma=false;iv.date=todayStr();
 log('Pro forma '+old+' transformée en facture '+iv.num+' — '+iv.client);
 save();if(R[CUR])R[CUR]();toast('Facture '+iv.num+' créée');
}

 const iv=S.invoices.find(x=>x.id===id);if(!iv)return;
 const t=invTotals(iv);

 if(S.company.logo){try{doc.addImage(S.company.logo,'PNG',14,12,22,22);}catch(e){}}
 doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(14,90,69);

 doc.setFontSize(11);doc.setTextColor(60);
 doc.text((iv.proforma?'FACTURE PRO FORMA ':'FACTURE ')+iv.num,S.company.logo?40:14,27);
 const _ci=[S.company.address||'',S.company.tel?'Tél : '+S.company.tel:'',S.company.email||'',S.company.ninea?'NINEA : '+S.company.ninea:'',S.company.rccm?'RCCM : '+S.company.rccm:''].filter(Boolean).join('  ·  ');
 if(_ci){doc.setFont('helvetica','normal');doc.setFontSize(7.6);doc.setTextColor(110);doc.text(_ci,S.company.logo?40:14,32.5,{maxWidth:S.company.logo?155:180});}
 doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(20);
 doc.text('Client : '+iv.client+(iv.phone?'   Tél : '+iv.phone:''),14,44);
 doc.text('Date : '+dateLabel(iv.date),14,50);
 doc.autoTable({startY:58,head:[['Désignation','Qté','P.U. ('+S.company.symbol+')','Total']],
  body:iv.lines.map(l=>[l.label,String(l.qty),pdfN(l.pu),pdfN(l.qty*l.pu)]),
  headStyles:{fillColor:[14,90,69]},styles:{font:'helvetica',fontSize:10}});
 let y=doc.lastAutoTable.finalY+8;
 if(t.remise>0){
  doc.text('Sous-total HT : '+pdfN(t.htBrut)+' '+S.company.symbol,130,y);y+=6;
  doc.text('Réduction'+(iv.disc&&iv.disc.t==='pct'?' ('+iv.disc.v+' %)':'')+' : -'+pdfN(t.remise)+' '+S.company.symbol,130,y);y+=6;
 }
 doc.text('Total HT : '+pdfN(t.ht)+' '+S.company.symbol,130,y);
 if(iv.tva>0){y+=6;doc.text('TVA ('+iv.tva+' %) : '+pdfN(t.tva)+' '+S.company.symbol,130,y);}
 y+=7;doc.setFont('helvetica','bold');doc.setFontSize(12);
 doc.text('Total TTC : '+pdfN(t.ttc)+' '+S.company.symbol,130,y);
 y+=10;
 doc.setFont('helvetica','bolditalic');doc.setFontSize(9);doc.setTextColor(28,36,32);
 const arrLines=doc.splitTextToSize(arrete(iv),182);
 if(y+arrLines.length*4>280){doc.addPage();y=20;}
 doc.text(arrLines,14,y);
 doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(130);
 doc.text('Document généré avec Trezo',14,287);
 doc.save(iv.num+'.pdf');
 log('PDF généré : '+iv.num);save();
}

async function newUserDo(){
 const name=document.getElementById('nu-name').value.trim();
 let email=document.getElementById('nu-email').value.trim().toLowerCase();
 if(email&&email.indexOf('@')<0){const d=email.replace(/\D/g,'');if(d.length>=8)email='tel'+d+'@trezo.local';}

 if(pass.length<8){msg.innerHTML='<div class="msg-err">Mot de passe : 8 caractères minimum.</div>';return;}

 try{
  const SB2=window.supabase.createClient(CONFIG.url,CONFIG.anonKey,{auth:{persistSession:false,autoRefreshToken:false}});

   else if(m.indexOf('admin_add_member')>=0&&m.indexOf('does not exist')>=0)msg.innerHTML='<div class="msg-err">Exécutez d’abord <b>migration-comptes-collaborateurs.sql</b> dans Supabase (SQL Editor).</div>';
   else msg.innerHTML='<div class="msg-err">'+esc(authErr(r.error))+'</div>';
   return;
  }
  log('Compte collaborateur créé : '+(name||email));save();
  msg.innerHTML='<div class="msg-ok">Compte créé ✓ Transmettez au collaborateur : identifiant <b>'+esc(email)+'</b> + le mot de passe initial. Connexion possible immédiatement.</div>';

function impDate(v){
 if(v instanceof Date&&!isNaN(v))return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
 if(typeof v==='number'&&v>20000&&v<80000)return impDate(new Date(Math.round((v-25569)*86400000)));
 const s=String(v).trim();let m;
 if(m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/))return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
 if(m=s.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{4})/))return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
 return null;
}
function impType(v){
 const s=stripAcc(v).toLowerCase().trim();
 if(!s)return null;
 if(s.indexOf('enc')===0||s==='e'||s.indexOf('entr')===0||s==='in'||s.indexOf('recet')===0||s.indexOf('cred')===0)return'in';
 if(s.indexOf('dec')===0||s==='d'||s.indexOf('sort')===0||s==='out'||s.indexOf('depens')===0||s.indexOf('deb')===0)return'out';
 return null;
}
function impAmt(v){
 if(typeof v==='number')return v>0?v:null;
 const n=parseFloat(String(v).replace(/[\s\u00a0]/g,'').replace(',','.').replace(/[^0-9.\-]/g,''));
 return !isNaN(n)&&n>0?n:null;
}

   const ws=wb.Sheets[wb.SheetNames[0]];

   if(!rows.length){res.innerHTML='<div class="msg-err">Fichier vide ou illisible.</div>';return;}
   if(rows.length>5000){res.innerHTML='<div class="msg-err">Fichier trop volumineux ('+rows.length+' lignes, maximum 5 000).</div>';return;}

   const miss=['date','type','amt'].filter(c=>!map[c]);
   if(miss.length){const noms={date:'Date',type:'Type',amt:'Montant'};res.innerHTML='<div class="msg-err">Structure invalide — colonne(s) manquante(s) : <b>'+miss.map(c=>noms[c]).join(', ')+'</b>. Téléchargez le modèle pour voir le format attendu.</div>';return;}
   IMP={rows:[],errors:[]};
   rows.forEach((row,i)=>{
    const line=i+2,errs=[];
    const d=impDate(row[map.date]);if(!d)errs.push('date invalide');
    const t=impType(row[map.type]);if(!t)errs.push('type invalide (attendu : Encaissement ou Décaissement)');

    let cat=map.cat?String(row[map.cat]).trim().slice(0,40):'';

    IMP.rows.push({type:t,amount:a,date:d,cat:cat,acc:iacc,desc:map.desc?String(row[map.desc]).trim().slice(0,120):''});
   });
   const errHtml=IMP.errors.length?'<div class="msg-err" style="white-space:normal">'+IMP.errors.slice(0,10).map(esc).join('<br>')+(IMP.errors.length>10?'<br>… et '+(IMP.errors.length-10)+' autre(s) erreur(s)':'')+'</div>':'';
   res.innerHTML='<div class="'+(IMP.errors.length?'msg-err':'msg-ok')+'" style="margin-top:.8rem">'+IMP.rows.length+' ligne(s) valide(s) · '+IMP.errors.length+' erreur(s)</div>'+errHtml+(IMP.rows.length?'<button class="btn btn-p btn-full mt" onclick="doImport()">Importer les '+IMP.rows.length+' opération(s) valide(s)</button>':'');
  }catch(err){res.innerHTML='<div class="msg-err">Impossible de lire ce fichier. Vérifiez qu’il s’agit bien d’un .xlsx ou .csv.</div>';}
 };
 r.readAsArrayBuffer(f);

/* ===== Montant en toutes lettres ===== */
function frLettres(n){
 n=Math.round(Math.abs(n||0));
 if(n===0)return'zéro';
 const U=['','un','deux','trois','quatre','cinq','six','sept','huit','neuf','dix','onze','douze','treize','quatorze','quinze','seize','dix-sept','dix-huit','dix-neuf'];
 function deux(x,mult){
  if(x<20)return U[x];
  const D=['','','vingt','trente','quarante','cinquante','soixante','','quatre-vingt',''];
  let d=Math.floor(x/10),u=x%10;
  if(d===7||d===9){d--;u+=10;}
  let s=D[d];
  if(u===1&&d<8)s+=' et un';
  else if(u>0)s+='-'+U[u];
  else if(d===8&&!mult)s+='s';
  return s;
 }
 function trois(x,mult){
  const c=Math.floor(x/100),r=x%100;
  let s='';
  if(c===1)s='cent';
  else if(c>1)s=U[c]+' cent'+((r===0&&!mult)?'s':'');
  if(r>0)s+=(s?' ':'')+deux(r,mult&&c===0);
  return s;
 }
 const parts=[];let rest=n;
 [[1000000000,'milliard','milliards',false],[1000000,'million','millions',false],[1000,'mille','mille',true]].forEach(g=>{
  const q=Math.floor(rest/g[0]);
  if(q>0){rest=rest%g[0];
   if(g[3]&&q===1)parts.push('mille');
   else parts.push(trois(q,g[3])+' '+(q>1?g[2]:g[1]));}
 });
 if(rest>0)parts.push(trois(rest,false));
 return parts.join(' ').replace(/\s+/g,' ').trim();
}

 const map={XOF:'francs CFA',XAF:'francs CFA',MAD:'dirhams',TND:'dinars',DZD:'dinars',EGP:'livres égyptiennes',NGN:'nairas',GHS:'cedis',KES:'shillings',TZS:'shillings',UGX:'shillings',RWF:'francs rwandais',GNF:'francs guinéens',CDF:'francs congolais',MRU:'ouguiyas',ZAR:'rands',ETB:'birrs',USD:'dollars',EUR:'euros'};
 return map[S.company.currency]||S.company.symbol;
}

 return 'Arrêté la présente '+(iv.proforma?'pro forma':'facture')+' à la somme de : '+w.charAt(0).toUpperCase()+w.slice(1)+' ('+pdfN(t)+') '+currencyWords()+' TTC.';

function payInvoiceFromFlux(ivId,amt,d,acc,cliId){
 const iv=S.invoices.find(x=>x.id===ivId);if(!iv)return;
 const t=invTotals(iv),reg=invPaid(iv),sol=Math.max(0,t.ttc-reg);
 if(amt>sol+0.5){toast('Montant supérieur au reste dû ('+fmt(sol)+') — encaissement refusé pour éviter un double règlement');return;}
 if(!Array.isArray(iv.pays))iv.pays=iv.paid?[{d:iv.date,amount:t.ttc}]:[];
 iv.pays.push({d:d,amount:amt,acc:acc});
 iv.paid=(invPaid(iv)>=t.ttc-0.5);
 S.tx.push({id:uid(),type:'in',amount:amt,cat:'Ventes',desc:'Facture '+iv.num+' — '+iv.client+(iv.paid?'':' (acompte)'),date:d,acc:acc,clientId:cliId||iv.clientId||null,ivId:iv.id,productId:null,qty:null});
 log('Encaissement facture '+iv.num+' depuis les Flux ('+accName(acc)+') : '+fmt(amt)+(iv.paid?' — facture soldée':' — reste dû '+fmt(Math.max(0,t.ttc-invPaid(iv)))));
 save();R.flux();toast(iv.paid?'Facture '+iv.num+' soldée ✓':'Acompte enregistré — reste dû '+fmt(Math.max(0,t.ttc-invPaid(iv))));
}

function cliHandleImport(inp){
 const f=inp.files[0];if(!f)return;
 if(!window.XLSX){toast('Module Excel non chargé — connectez-vous une fois à Internet');return;}
 const res=document.getElementById('cli-imp-res');
 res.innerHTML='<div class="fine mt">Analyse du fichier…</div>';
 const r=new FileReader();
 r.onload=e=>{
  try{
   const wb=XLSX.read(e.target.result,{type:'array'});
   const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
   if(!rows.length){res.innerHTML='<div class="msg-err">Fichier vide ou illisible.</div>';return;}
   if(rows.length>5000){res.innerHTML='<div class="msg-err">Maximum 5 000 lignes.</div>';return;}
   const map={};
   Object.keys(rows[0]).forEach(k=>{const n=stripAcc(k).toLowerCase().trim();
    if(n==='nom'||n.indexOf('raison')===0||n==='name')map.name=k;
    else if(n.indexOf('prenom')===0)map.first=k;
    else if(n.indexOf('tel')===0||n==='phone')map.tel=k;
    else if(n.indexOf('adres')===0||n==='address')map.addr=k;});
   if(!map.name){res.innerHTML='<div class="msg-err">Structure invalide — colonne <b>Nom</b> (ou Raison sociale) introuvable.</div>';return;}
   let ok=0,skip=0,vide=0;
   rows.forEach(row=>{
    const name=String(row[map.name]).trim();
    if(!name){vide++;return;}
    const phone=map.tel?String(row[map.tel]).trim():'';
    if(S.clients.some(c=>c.name.toLowerCase()===name.toLowerCase()&&(c.phone||'')===phone)){skip++;return;}
    S.clients.push({id:uid(),name:name,firstname:map.first?String(row[map.first]).trim():'',phone:phone,address:map.addr?String(row[map.addr]).trim():''});
    ok++;
   });
   log('Import clients : '+ok+' ajouté(s), '+skip+' doublon(s) ignoré(s)');
   save();renderCliList();
   res.innerHTML='<div class="msg-ok" style="margin-top:.8rem">'+ok+' client(s) importé(s) · '+skip+' doublon(s) ignoré(s) · '+vide+' ligne(s) sans nom.</div>';
  }catch(err2){res.innerHTML='<div class="msg-err">Impossible de lire ce fichier. Vérifiez qu’il s’agit bien d’un .xlsx ou .csv.</div>';}
 };
 r.readAsArrayBuffer(f);
}

  kpi.forEach((k,i)=>{
   const x=L+i*(bw+gap);
   doc.setFillColor(247,243,236);doc.roundedRect(x,y,bw,21,2.5,2.5,'F');
   doc.setFontSize(6.6);doc.setTextColor(94,107,100);doc.setFont('helvetica','bold');
   doc.text(k[0],x+3.5,y+6);
   doc.setFontSize(11);doc.setTextColor(k[2][0],k[2][1],k[2][2]);
   doc.text(k[1],x+3.5,y+13.5);
   doc.setFontSize(6.6);doc.setTextColor(94,107,100);doc.setFont('helvetica','normal');
   doc.text(S.company.symbol,x+3.5,y+18.3);
  });
  y+=27;
  /* Objectif avec barre de progression */
  const gT=goalFor(m);
  if(gT&&gT>0){
   const pc=Math.min(1,enc/gT);
   doc.setFontSize(8.5);doc.setTextColor(28,36,32);doc.setFont('helvetica','bold');
   doc.text('Objectif du mois : '+pdfN(gT)+' '+S.company.symbol,L,y);
   doc.setFont('helvetica','normal');doc.setTextColor(94,107,100);
   doc.text(Math.round(enc/gT*100)+' % atteint',Rt,y,{align:'right'});
   doc.setFillColor(231,226,216);doc.roundedRect(L,y+2.5,182,3.4,1.7,1.7,'F');
   if(pc>0){doc.setFillColor(242,179,61);doc.roundedRect(L,y+2.5,Math.max(4,182*pc),3.4,1.7,1.7,'F');}
   y+=13;
  }
  if(S.accounts.length>1){
   doc.setFontSize(8);doc.setTextColor(94,107,100);doc.setFont('helvetica','normal');
   const accLine=doc.splitTextToSize('Soldes par compte : '+S.accounts.map(a=>a.name+' '+pdfN(accBal(a.id))).join('  ·  ')+' '+S.company.symbol,182);
   doc.text(accLine,L,y+2);y+=accLine.length*4+5;
  }
  function section(t){
   if(y>238){doc.addPage();y=22;}
   doc.setFillColor(242,179,61);doc.rect(L,y-3.2,3.2,3.2,'F');
   doc.setFont('helvetica','bold');doc.setFontSize(10.5);doc.setTextColor(10,61,47);
   doc.text(t,L+5.5,y);
   y+=3;
  }
  function table(opts){
   doc.autoTable(Object.assign({startY:y,margin:{left:L,right:L,bottom:20},styles:{font:'helvetica',fontSize:8.6,cellPadding:2.4,textColor:[28,36,32]},headStyles:{fillColor:[14,90,69],fontSize:8},alternateRowStyles:{fillColor:[250,248,244]}},opts));
   y=(doc.lastAutoTable?doc.lastAutoTable.finalY:y+20)+10;
  }
  const right={halign:'right'};
  const cats={};S.tx.filter(x=>x.type==='out'&&x.date.slice(0,7)===m).forEach(x=>cats[x.cat]=(cats[x.cat]||0)+x.amount);
  const ck=Object.keys(cats).sort((a,b)=>cats[b]-cats[a]);
  if(ck.length){
   section('Décaissements par catégorie');
   table({head:[['Catégorie',{content:'Montant ('+S.company.symbol+')',styles:right},{content:'Part',styles:right}]],
    body:ck.map(k=>[k,{content:pdfN(cats[k]),styles:right},{content:(dec>0?Math.round(cats[k]/dec*100):0)+' %',styles:right}])});
  }
  const prod={};
  S.tx.filter(x=>x.type==='in'&&x.date.slice(0,7)===m&&x.productId).forEach(x=>{const p=S.products.find(q=>q.id===x.productId);if(p){prod[p.name]=prod[p.name]||{q:0,a:0};prod[p.name].q+=x.qty||1;prod[p.name].a+=x.amount;}});
  const pk=Object.keys(prod).sort((a,b)=>prod[b].a-prod[a].a).slice(0,8);
  if(pk.length){
   section('Produits les plus vendus');
   table({head:[['Produit',{content:'Qté',styles:right},{content:'Montant ('+S.company.symbol+')',styles:right}]],
    body:pk.map(k=>[k,{content:String(prod[k].q),styles:right},{content:pdfN(prod[k].a),styles:right}]),
    headStyles:{fillColor:[242,179,61],textColor:[61,42,0],fontSize:8}});
  }
  const sp=S.salPays.filter(p=>p.month===m);
  if(sp.length){
   section('Salaires payés');
   table({head:[['Employé',{content:'Payé le',styles:right},{content:'Montant ('+S.company.symbol+')',styles:right}]],
    body:sp.map(p=>{const e=S.employees.find(x=>x.id===p.empId);return[e?e.name:'(retiré)',{content:dateLabel(p.date),styles:right},{content:pdfN(p.amount),styles:right}];})});
  }
  if(!ck.length&&!pk.length&&!sp.length){
   doc.setFontSize(9);doc.setTextColor(94,107,100);doc.setFont('helvetica','italic');
   doc.text('Aucune opération détaillée enregistrée ce mois-ci.',L,y+4);
  }
  /* Pied de page paginé */
  const np=doc.internal.getNumberOfPages();
  for(let i=1;i<=np;i++){
   doc.setPage(i);
   doc.setDrawColor(231,226,216);doc.line(L,286,Rt,286);
   doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(150,145,135);
   doc.text(String(S.company.name).slice(0,40)+' — rapport généré avec Trezo',L,291);
   doc.text('Page '+i+' / '+np,Rt,291,{align:'right'});
  }
  doc.save('rapport-'+m+'.pdf');
  log('Rapport mensuel généré ('+m+')');save();
 }catch(err){
  console.error('Rapport:',err);
  toast('Erreur rapport : '+((err&&err.message)?err.message:err));
 }
}
</script>
</body>
</html>
