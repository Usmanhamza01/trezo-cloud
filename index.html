<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trezo Cloud — La trésorerie de votre PME, synchronisée</title>
<meta name="description" content="Gestion de trésorerie pour PME : encaissements, décaissements, salaires, stocks, factures.">
<meta name="theme-color" content="#0E5A45">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<style>
:root{
  --vert:#0E5A45; --vert-fonce:#0A3D2F; --ambre:#F2B33D; --ambre-fonce:#8A6210;
  --menthe:#7FC8A9; --sable:#F7F3EC; --blanc:#FFFFFF;
  --encre:#1C2420; --gris:#5E6B64; --ligne:#E4DDD1;
  --rouge:#C0492F; --rouge-pale:#FBEAE5; --vert-pale:#E3F2EA; --ambre-pale:#FCF0D8;
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'Manrope',system-ui,-apple-system,sans-serif;background:var(--sable);color:var(--encre);min-height:100vh;padding-bottom:calc(74px + env(safe-area-inset-bottom))}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:1rem}
input,select,textarea{font-family:inherit;font-size:1rem;width:100%;padding:.7rem .85rem;border:1.5px solid var(--ligne);border-radius:10px;background:var(--blanc);color:var(--encre)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--vert);outline-offset:1px;border-color:var(--vert)}
label{display:block;font-size:.82rem;font-weight:600;color:var(--gris);margin:.85rem 0 .3rem}
h1{font-size:1.35rem;font-weight:800}
h2{font-size:1.1rem;font-weight:800;margin-bottom:.75rem}
h3{font-size:.95rem;font-weight:800}

/* ---------- En-tête ---------- */
header{position:sticky;top:0;z-index:40;background:var(--vert);color:var(--blanc);padding:.7rem 1rem;padding-top:calc(.7rem + env(safe-area-inset-top));display:flex;align-items:center;gap:.7rem}
header .hlogo{width:36px;height:36px;border-radius:9px;flex:none;object-fit:cover;background:var(--blanc)}
header .hname{font-weight:800;font-size:1.05rem;line-height:1.15;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
header .hsub{font-size:.68rem;font-weight:600;opacity:.75}
.btn-lock{background:rgba(255,255,255,.14);color:var(--blanc);border-radius:10px;padding:.5rem .7rem;font-weight:700;font-size:.8rem;flex:none}

/* ---------- Boutons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.75rem 1.2rem;border-radius:11px;font-weight:800;font-size:.95rem;transition:transform .08s}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--vert);color:var(--blanc)}
.btn-a{background:var(--ambre);color:#3d2a00}
.btn-o{background:var(--blanc);color:var(--vert);border:1.5px solid var(--vert)}
.btn-d{background:var(--rouge-pale);color:var(--rouge)}
.btn-sm{padding:.45rem .8rem;font-size:.8rem;border-radius:9px}
.btn-full{width:100%}
.btn[disabled]{opacity:.5;pointer-events:none}

/* ---------- Cartes ---------- */
main{max-width:1080px;margin:0 auto;padding:1rem}
.card{background:var(--blanc);border:1px solid var(--ligne);border-radius:var(--r);padding:1.1rem;margin-bottom:1rem}
.hero{background:var(--vert);color:var(--blanc);border:none;position:relative;overflow:hidden}
.hero .hbars{position:absolute;right:14px;bottom:0;display:flex;align-items:flex-end;gap:7px;opacity:.35}
.hero .hbars i{display:block;width:13px;border-radius:4px 4px 0 0}
.hero .lbl{font-size:.75rem;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.06em}
.hero .big{font-size:2.1rem;font-weight:800;letter-spacing:-.02em;margin:.15rem 0 .4rem}
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem}
.kpi{background:var(--blanc);border:1px solid var(--ligne);border-radius:var(--r);padding:.9rem}
.kpi .lbl{font-size:.72rem;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:.05em}
.kpi .val{font-size:1.25rem;font-weight:800;margin-top:.2rem;letter-spacing:-.01em}
.kpi.in .val{color:var(--vert)} .kpi.out .val{color:var(--rouge)}

/* ---------- Listes ---------- */
.row{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--ligne)}
.row:last-child{border-bottom:none}
.row .dot{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;flex:none;font-size:1.05rem}
.dot.in{background:var(--vert-pale);color:var(--vert)} .dot.out{background:var(--rouge-pale);color:var(--rouge)}
.row .rmain{flex:1;min-width:0}
.row .rt{font-weight:700;font-size:.92rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row .rs{font-size:.78rem;color:var(--gris)}
.row .ramt{font-weight:800;font-size:.92rem;white-space:nowrap}
.ramt.in{color:var(--vert)} .ramt.out{color:var(--rouge)}
.chip{display:inline-block;padding:.2rem .6rem;border-radius:99px;font-size:.72rem;font-weight:700}
.chip-g{background:var(--vert-pale);color:var(--vert)} .chip-r{background:var(--rouge-pale);color:var(--rouge)} .chip-a{background:var(--ambre-pale);color:var(--ambre-fonce)}
.empty{text-align:center;color:var(--gris);padding:1.6rem .5rem;font-size:.9rem}
.pbar{height:9px;background:var(--sable);border-radius:99px;overflow:hidden;margin:.4rem 0}
.pbar i{display:block;height:100%;background:var(--ambre);border-radius:99px;transition:width .4s}
.pbar i.done{background:var(--menthe)}

/* ---------- Onglets ---------- */
.tabs{display:flex;background:var(--blanc);border:1px solid var(--ligne);border-radius:12px;padding:4px;margin-bottom:1rem}
.tabs button{flex:1;padding:.6rem;border-radius:9px;font-weight:800;font-size:.88rem;color:var(--gris)}
.tabs button.on{background:var(--vert);color:var(--blanc)}
.tabs button.on.t-out{background:var(--rouge)}

/* ---------- Navigation ---------- */
nav.bottom{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--blanc);border-top:1px solid var(--ligne);display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav.bottom button{flex:1;padding:.55rem 0 .5rem;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.64rem;font-weight:700;color:var(--gris)}
nav.bottom button svg{width:23px;height:23px}
nav.bottom button.on{color:var(--vert)}
aside.side{display:none}

/* ---------- Feuille "Plus" + modales ---------- */
.sheet-bg{position:fixed;inset:0;background:rgba(20,30,25,.45);z-index:50;display:none;align-items:flex-end;justify-content:center}
.sheet-bg.open{display:flex}
.sheet{background:var(--blanc);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:1.2rem;padding-bottom:calc(1.2rem + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto}
@media(min-width:720px){.sheet-bg{align-items:center;padding:1rem}.sheet{border-radius:20px}}
.sheet h2{display:flex;justify-content:space-between;align-items:center}
.sheet .close{font-size:1.5rem;color:var(--gris);padding:.2rem .5rem}
.menu-it{display:flex;align-items:center;gap:.8rem;width:100%;padding:.85rem .4rem;border-bottom:1px solid var(--ligne);font-weight:700;font-size:.95rem;text-align:left;color:var(--encre)}
.menu-it svg{width:22px;height:22px;color:var(--vert)}

/* ---------- Onboarding / licence ---------- */
.ob-bg{position:fixed;inset:0;background:var(--vert);z-index:100;overflow-y:auto;display:none}
.ob-bg.open{display:block}
.ob{max-width:480px;margin:0 auto;padding:2rem 1.3rem 3rem;color:var(--blanc)}
.ob .panel{background:var(--blanc);color:var(--encre);border-radius:18px;padding:1.4rem;margin-top:1.4rem}
.ob-logo{display:flex;align-items:center;gap:.8rem;margin-bottom:.4rem}
.steps{display:flex;gap:6px;margin-top:1.2rem}
.steps i{height:5px;flex:1;border-radius:99px;background:rgba(255,255,255,.25)}
.steps i.on{background:var(--ambre)}
.plist .row .rt{font-weight:700}
.msg-err{color:var(--rouge);font-size:.85rem;font-weight:700;margin-top:.5rem}
.msg-ok{color:var(--vert);font-size:.85rem;font-weight:700;margin-top:.5rem}

/* ---------- Tableaux ---------- */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--gris);padding:.5rem .55rem;border-bottom:1.5px solid var(--ligne);white-space:nowrap}
td{padding:.6rem .55rem;border-bottom:1px solid var(--ligne);white-space:nowrap}
.tr-alert td{background:var(--rouge-pale)}

/* ---------- Divers ---------- */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.mt{margin-top:1rem}
.charts{display:grid;gap:1rem}
canvas{max-width:100%}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--encre);color:var(--blanc);padding:.7rem 1.2rem;border-radius:12px;font-weight:700;font-size:.88rem;z-index:120;opacity:0;pointer-events:none;transition:opacity .25s;max-width:90vw;text-align:center}
.toast.show{opacity:1}
body.readonly .adm{display:none !important}
.ro-banner{display:none;background:var(--ambre);color:#3d2a00;font-weight:800;font-size:.8rem;text-align:center;padding:.45rem}
body.readonly .ro-banner{display:block}
.view{display:none}.view.on{display:block}
.inline-add{display:flex;gap:.5rem}.inline-add input{flex:1}
.fine{font-size:.78rem;color:var(--gris);line-height:1.5}

/* ---------- Bureau ---------- */
@media(min-width:900px){
  body{padding-bottom:0}
  nav.bottom{display:none}
  aside.side{display:block;position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--vert-fonce);color:var(--blanc);padding:1.2rem .8rem;z-index:45}
  aside.side .slogo{display:flex;align-items:center;gap:.6rem;padding:.4rem;margin-bottom:1.4rem;font-weight:800;font-size:1.2rem}
  aside.side button{display:flex;align-items:center;gap:.7rem;width:100%;padding:.7rem .8rem;border-radius:10px;color:rgba(255,255,255,.75);font-weight:700;font-size:.9rem;margin-bottom:.15rem;text-align:left}
  aside.side button svg{width:20px;height:20px}
  aside.side button.on{background:var(--vert);color:var(--blanc)}
  header,main{margin-left:220px}
  main{max-width:1000px;padding:1.4rem 2rem}
  .kgrid{grid-template-columns:repeat(4,1fr)}
  .charts{grid-template-columns:3fr 2fr}
  .hero .big{font-size:2.6rem}
}
/* ---------- Facture : aperçu & impression ---------- */
.inv-doc{background:#fff;color:#1C2420;padding:1.4rem;border-radius:8px;min-width:290px;font-size:.9rem;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.inv-head{display:flex;gap:.9rem;align-items:center;border-bottom:3px solid var(--vert);padding-bottom:.8rem;margin-bottom:.9rem}
.inv-head img{width:52px;height:52px;border-radius:10px;object-fit:cover}
.inv-co{font-weight:800;font-size:1.15rem;color:var(--vert)}
.inv-num{font-size:.85rem;color:#555;font-weight:700}
.inv-meta{display:flex;justify-content:space-between;gap:1rem;margin-bottom:.9rem;font-size:.85rem;flex-wrap:wrap}
.inv-table{width:100%;border-collapse:collapse;font-size:.85rem}
.inv-table th{background:var(--vert);color:#fff;text-align:left;padding:.45rem .5rem;font-size:.75rem;text-transform:none;letter-spacing:0;border:none}
.inv-table td{padding:.45rem .5rem;border-bottom:1px solid #e5e0d5}
.inv-tot{margin-top:.9rem;text-align:right}
.inv-tot .ttc{font-weight:800;font-size:1.05rem;margin-top:.25rem;color:var(--vert)}
.inv-foot{margin-top:1.2rem;font-size:.7rem;color:#999}
#print-area{display:none}
@media print{body>*{display:none !important}#print-area{display:block !important}#print-area .inv-doc{box-shadow:none;border-radius:0;padding:0}}
@media(prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}
</style>
</head>
<body>

<div class="ro-banner">Mode lecture seule — les modifications sont désactivées</div>

<header>
  <img class="hlogo" id="h-logo" alt="" src="icon-192.png">
  <div style="flex:1;min-width:0">
    <div class="hname" id="h-name">Trezo</div>
    <div class="hsub"><span id="h-lic"></span><span id="h-sync"></span></div>
  </div>
  <button class="btn-lock" id="btn-lock" title="Basculer le mode lecture seule">🔒 Verrouiller</button>
</header>

<aside class="side" id="side"></aside>

<main id="main">
  <div class="view" id="v-dash"></div>
  <div class="view" id="v-flux"></div>
  <div class="view" id="v-sal"></div>
  <div class="view" id="v-obj"></div>
  <div class="view" id="v-stock"></div>
  <div class="view" id="v-fact"></div>
  <div class="view" id="v-jour"></div>
  <div class="view" id="v-set"></div>
</main>

<nav class="bottom" id="bnav"></nav>

<div class="sheet-bg" id="sheet-plus"><div class="sheet">
  <h2>Menu <button class="close" onclick="closeSheet('sheet-plus')">×</button></h2>
  <div id="plus-items"></div>
</div></div>

<div class="sheet-bg" id="sheet-modal"><div class="sheet" id="modal-body"></div></div>

<div class="ob-bg" id="ob"><div class="ob" id="ob-body"></div></div>

<div class="toast" id="toast"></div>
<div id="print-area"></div>

<script>
'use strict';
/* ===== Trezo Cloud v1 — cœur ===== */
const CONFIG=window.TREZO_CONFIG||{};
const CURRENCIES=[["XOF","FCFA","Franc CFA (UEMOA)"],["XAF","FCFA","Franc CFA (CEMAC)"],["MAD","DH","Dirham marocain"],["TND","DT","Dinar tunisien"],["DZD","DA","Dinar algérien"],["EGP","E£","Livre égyptienne"],["NGN","₦","Naira nigérian"],["GHS","GH₵","Cedi ghanéen"],["KES","KSh","Shilling kényan"],["TZS","TSh","Shilling tanzanien"],["UGX","USh","Shilling ougandais"],["RWF","FRw","Franc rwandais"],["GNF","FG","Franc guinéen"],["CDF","FC","Franc congolais"],["MRU","UM","Ouguiya mauritanien"],["ZAR","R","Rand sud-africain"],["ETB","Br","Birr éthiopien"],["USD","$","Dollar US"],["EUR","€","Euro"]];
const CAT_IN=["Ventes","Prestations de services","Remboursement","Apport","Autre"];
const CAT_OUT=["Achats fournisseurs","Loyer","Salaires","Transport","Électricité & eau","Internet & téléphone","Impôts & taxes","Entretien","Autre"];
const DEFAULT={v:2,company:{name:"",currency:"XOF",symbol:"FCFA",logo:null},license:null,products:[],tx:[],employees:[],salPays:[],goals:[],invoices:[],journal:[],settings:{pin:null,readOnly:false,invSeq:0}};
const LOGO='data:image/svg+xml;utf8,'+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='42' fill='#0E5A45'/><rect x='46' y='104' width='22' height='42' rx='6' fill='#F2B33D'/><rect x='78' y='84' width='22' height='62' rx='6' fill='#7FC8A9'/><rect x='110' y='58' width='22' height='88' rx='6' fill='#FFFFFF'/><rect x='38' y='36' width='116' height='16' rx='6' fill='#FFFFFF'/></svg>");
let S=JSON.parse(JSON.stringify(DEFAULT));
let SB=null,SESSION=null,COMPANY=null,DOC_VERSION=1,SAVE_T=null,SAVING=false,PENDING=false;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayStr=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const curMonth=()=>todayStr().slice(0,7);
const NF=new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0});
const fmt=n=>NF.format(Math.round(n||0))+' '+S.company.symbol;
const fmt2=(n,sym)=>NF.format(Math.round(n||0))+' '+sym;
function monthLabel(m){const p=m.split('-');return new Date(+p[0],+p[1]-1,1).toLocaleDateString('fr-FR',{month:'short',year:'2-digit'});}
function dateLabel(d){return new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}
function log(txt){S.journal.unshift({d:new Date().toISOString(),txt});if(S.journal.length>300)S.journal.length=300;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);}
async function sha(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase();}
function setSync(t){const e=document.getElementById('h-sync');if(e)e.textContent=t;}

/* ===== Persistance cloud (document par entreprise, verrou optimiste) ===== */
function save(){
 if(!COMPANY)return;
 PENDING=true;setSync(' · enregistrement…');
 clearTimeout(SAVE_T);SAVE_T=setTimeout(flushSave,700);
}
async function flushSave(){
 if(!COMPANY)return;
 if(SAVING){PENDING=true;return;}
 SAVING=true;PENDING=false;
 try{
  const payload={products:S.products,tx:S.tx,employees:S.employees,salPays:S.salPays,goals:S.goals,invoices:S.invoices,journal:S.journal,settings:S.settings,logo:S.company.logo};
  const r=await SB.rpc('save_data',{p_company:COMPANY.id,p_data:payload,p_version:DOC_VERSION});
  if(r.error)throw r.error;
  DOC_VERSION=r.data;setSync(' · ✓ synchronisé');
 }catch(e){
  const m=String((e&&e.message)||e);
  if(m.indexOf('version_conflict')>=0){toast('Données modifiées depuis un autre appareil — rechargement…');setTimeout(()=>location.reload(),1400);SAVING=false;return;}
  if(m.indexOf('license_expired')>=0){SAVING=false;showExpired();return;}
  setSync(' · hors ligne — réessai…');PENDING=true;
  setTimeout(()=>{SAVING=false;flushSave();},8000);return;
 }
 SAVING=false;
 if(PENDING)save();
}
function licDaysLeft(){if(!S.license||!S.license.expiry)return -1;return Math.ceil((new Date(S.license.expiry).getTime()-Date.now())/86400000);}

/* ===== Feuilles / modales ===== */
function openSheet(id){document.getElementById(id).classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function openModal(h){document.getElementById('modal-body').innerHTML=h;openSheet('sheet-modal');}
document.querySelectorAll('.sheet-bg').forEach(b=>b.addEventListener('click',e=>{if(e.target===b)b.classList.remove('open');}));

/* ===== Navigation ===== */
const IC={dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 9.5V20h5v-6h4v6h5V9.5"/></svg>',
flux:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17l-4-4 4-4"/><path d="M3 13h14"/><path d="M17 7l4 4-4 4"/><path d="M21 11H7"/></svg>',
sal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.5"/><path d="M2.5 20c0-3.6 2.9-6 6.5-6s6.5 2.4 6.5 6"/><circle cx="17" cy="9" r="2.5"/><path d="M17 14.5c2.8 0 4.5 2 4.5 4.5"/></svg>',
obj:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>',
stock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/></svg>',

function authErr(e){
 const m=String((e&&e.message)||e||'');
 if(m.indexOf('Invalid login')>=0)return 'E-mail ou mot de passe incorrect.';
 if(m.indexOf('already registered')>=0)return 'Un compte existe déjà avec cet e-mail — connectez-vous.';
 if(m.indexOf('Email not confirmed')>=0)return 'E-mail non confirmé : cliquez le lien reçu par e-mail, puis reconnectez-vous.';
 if(m.indexOf('at least 6')>=0)return 'Mot de passe : 6 caractères minimum.';
 if(m.indexOf('invalid_key')>=0)return 'Clé invalide pour ce nom d’entreprise. Vérifiez la clé et l’orthographe exacte du nom.';
 if(m.indexOf('expired_key')>=0)return 'Cette clé est expirée. Contactez votre revendeur.';
 if(m.indexOf('already_has_company')>=0)return 'Ce compte possède déjà une entreprise.';
 if(m.indexOf('Failed to fetch')>=0||m.indexOf('NetworkError')>=0)return 'Connexion Internet requise — vérifiez votre réseau.';
 return 'Erreur : '+m;
}

async function doSignup(){
 const em=document.getElementById('au-email').value.trim(),p=document.getElementById('au-pass').value,p2=document.getElementById('au-pass2').value;
 if(!em||em.indexOf('@')<1){auMsg('<div class="msg-err">Adresse e-mail invalide.</div>');return;}
 if(p.length<6){auMsg('<div class="msg-err">Mot de passe : 6 caractères minimum.</div>');return;}
 if(p!==p2){auMsg('<div class="msg-err">Les deux mots de passe ne correspondent pas.</div>');return;}
 auMsg('<div class="fine">Création du compte…</div>');
 const r=await SB.auth.signUp({email:em,password:p});
 if(r.error){auMsg('<div class="msg-err">'+esc(authErr(r.error))+'</div>');return;}
 if(!r.data.session){auMsg('<div class="msg-ok">Compte créé. Un e-mail de confirmation vous a été envoyé — cliquez le lien, puis revenez vous connecter.</div>');return;}
 SESSION=r.data.session;loadWorkspace();
}
async function doLogin(){

 auMsg('<div class="fine">Connexion…</div>');
 const r=await SB.auth.signInWithPassword({email:em,password:p});
 if(r.error){auMsg('<div class="msg-err">'+esc(authErr(r.error))+'</div>');return;}
 SESSION=r.data.session;loadWorkspace();
}
function applyCompany(){

function hydrate(cd){
 DOC_VERSION=cd.version;const d=cd.data||{};
 ['products','tx','employees','salPays','goals','invoices','journal'].forEach(k=>S[k]=Array.isArray(d[k])?d[k]:[]);
 S.settings=Object.assign({},DEFAULT.settings,d.settings||{});
 S.company.logo=d.logo||null;
}
async function loadWorkspace(){
 obShow('<div class="empty">Chargement de votre espace…</div>',1);
 const r=await SB.from('memberships').select('company_id,companies(*)');
 if(r.error){obFail(r.error);return;}
 if(!r.data||!r.data.length){showCompanySetup();return;}
 COMPANY=r.data[0].companies;applyCompany();
 if(licDaysLeft()<=0){renderHeader();showExpired();return;}
 const cd=await SB.from('company_data').select('data,version').eq('company_id',COMPANY.id).single();
 if(cd.error){obFail(cd.error);return;}
 hydrate(cd.data);
 document.getElementById('ob').classList.remove('open');
 initApp();setSync(' · ✓ synchronisé');
}

function obLogo(inp){const f=inp.files[0];if(!f)return;resizeImg(f,url=>{OB.logo=url;document.getElementById('ob-logo-prev').src=url;});}
function resizeImg(file,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const s=Math.min(img.width,img.height);c.width=256;c.height=256;c.getContext('2d').drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,256,256);cb(c.toDataURL('image/png'));};img.src=e.target.result;};r.readAsDataURL(file);}
function obAddP(){
 const n=document.getElementById('ob-p-name').value.trim();
 if(!n){toast('Entrez le nom du produit');return;}
 OB.products.push({id:uid(),name:n,price:+document.getElementById('ob-p-price').value||0,cost:0,qty:+document.getElementById('ob-p-qty').value||0,alert:5});
 document.getElementById('ob-p-name').value='';document.getElementById('ob-p-price').value='';document.getElementById('ob-p-qty').value='';
 obRenderP();
}
function obRenderP(){document.getElementById('ob-plist').innerHTML=OB.products.map(p=>`<div class="row"><div class="rmain"><div class="rt">${esc(p.name)}</div><div class="rs">${fmt2(p.price,OB.symbol||S.company.symbol)} — stock : ${p.qty}</div></div><button class="btn btn-sm btn-d" onclick="obDelP('${p.id}')">Retirer</button></div>`).join('');}
function obDelP(id){OB.products=OB.products.filter(x=>x.id!==id);obRenderP();}
function obFinish(){
 S.products=OB.products;S.company.logo=OB.logo||null;

<script>
'use strict';
/* ===== Données agrégées ===== */
const txMonth=(m,t)=>S.tx.filter(x=>x.type===t&&x.date.slice(0,7)===m).reduce((a,x)=>a+x.amount,0);
const solde=()=>S.tx.reduce((a,x)=>a+(x.type==='in'?x.amount:-x.amount),0);
function last6(){const r=[],d=new Date();for(let i=5;i>=0;i--){const t=new Date(d.getFullYear(),d.getMonth()-i,1);r.push(t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0'));}return r;}
function txRow(x,del){
 const p=x.productId?S.products.find(q=>q.id===x.productId):null;
 return `<div class="row"><div class="dot ${x.type}">${x.type==='in'?'+':'−'}</div><div class="rmain"><div class="rt">${esc(x.desc||x.cat)}${p?' · '+esc(p.name)+(x.qty?' ×'+x.qty:''):''}</div><div class="rs">${dateLabel(x.date)} — ${esc(x.cat)}</div></div><div class="ramt ${x.type}">${x.type==='in'?'+':'−'} ${fmt(x.amount)}</div>${del&&x.type==='in'?(x.invId?`<button class="btn btn-sm btn-o" onclick="invPreview('${x.invId}')">Facture</button>`:`<button class="btn btn-sm btn-a adm" onclick="invoiceFromTx('${x.id}')">Facturer</button>`):''}${del?`<button class="btn btn-sm btn-d adm" onclick="delTx('${x.id}')">✕</button>`:''}</div>`;
}

/* ===== Tableau de bord ===== */
let CH={};
R.dash=function(){
 const m=curMonth(),enc=txMonth(m,'in'),dec=txMonth(m,'out');
 const goal=S.goals.find(g=>g.month===m);
 const low=S.products.filter(p=>p.qty<=p.alert&&p.alert>0);
 const recent=[...S.tx].sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id)).slice(0,5);
 document.getElementById('v-dash').innerHTML=`
 <div class="card hero">
  <div class="lbl">Solde de trésorerie</div>
  <div class="big">${fmt(solde())}</div>
  <div style="font-size:.85rem;opacity:.85">${monthLabel(m)} : <b>+${NF.format(enc)}</b> / <b>−${NF.format(dec)}</b> ${S.company.symbol}</div>
  <div class="hbars"><i style="height:26px;background:var(--ambre)"></i><i style="height:46px;background:var(--menthe)"></i><i style="height:66px;background:#fff"></i></div>
 </div>

  <div class="kpi in"><div class="lbl">Encaissements (mois)</div><div class="val">${fmt(enc)}</div></div>
  <div class="kpi out"><div class="lbl">Décaissements (mois)</div><div class="val">${fmt(dec)}</div></div>
  <div class="kpi"><div class="lbl">Résultat (mois)</div><div class="val" style="color:${enc-dec>=0?'var(--vert)':'var(--rouge)'}">${fmt(enc-dec)}</div></div>
  <div class="kpi"><div class="lbl">Objectif du mois</div><div class="val">${goal?Math.round(enc/goal.target*100)+' %':'—'}</div>${goal?`<div class="pbar"><i class="${enc>=goal.target?'done':''}" style="width:${Math.min(100,enc/goal.target*100)}%"></i></div>`:'<div class="fine">Définir dans Objectifs</div>'}</div>
 </div>
 ${low.length?`<div class="card" style="border-color:var(--rouge)"><h3 style="color:var(--rouge)">⚠ Stock bas</h3>${low.map(p=>`<div class="row"><div class="rmain"><div class="rt">${esc(p.name)}</div></div><span class="chip chip-r">${p.qty} restant(s)</span></div>`).join('')}</div>`:''}
 <div class="charts">

  <div class="card"><h3>Décaissements du mois</h3><canvas id="ch-pie" height="230"></canvas><div id="pie-empty"></div></div>
 </div>
 <div class="card"><h3>Dernières opérations</h3>${recent.length?recent.map(x=>txRow(x,false)).join(''):'<div class="empty">Aucune opération. Ajoutez vos premiers flux dans l’onglet Flux.</div>'}</div>`;
 drawCharts(m);
};
function drawCharts(m){
 if(!window.Chart)return;
 Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={};
 const ms=last6();
 CH.line=new Chart(document.getElementById('ch-line'),{type:'bar',data:{labels:ms.map(monthLabel),datasets:[
  {label:'Encaissements',data:ms.map(x=>txMonth(x,'in')),backgroundColor:'#0E5A45',borderRadius:5},
  {label:'Décaissements',data:ms.map(x=>txMonth(x,'out')),backgroundColor:'#F2B33D',borderRadius:5}]},
  options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>NF.format(v)}}}}});
 const cats={};S.tx.filter(x=>x.type==='out'&&x.date.slice(0,7)===m).forEach(x=>cats[x.cat]=(cats[x.cat]||0)+x.amount);
 const ks=Object.keys(cats);
 if(ks.length){CH.pie=new Chart(document.getElementById('ch-pie'),{type:'doughnut',data:{labels:ks,datasets:[{data:ks.map(k=>cats[k]),backgroundColor:['#0E5A45','#F2B33D','#7FC8A9','#C0492F','#5E6B64','#0A3D2F','#D9A05B','#8FBF9F','#7A5C3E']}]},options:{plugins:{legend:{position:'bottom'}}}});}
 else document.getElementById('pie-empty').innerHTML='<div class="empty">Aucun décaissement ce mois-ci.</div>';
}

  <h3>${FLUX==='in'?'Nouvel encaissement':'Nouveau décaissement'}</h3>
  ${FLUX==='in'&&S.products.length?`<label>Produit vendu (optionnel — met le stock à jour)</label><select id="f-prod" onchange="fluxProd()"><option value="">— Saisie libre —</option>${S.products.map(p=>`<option value="${p.id}">${esc(p.name)} (${NF.format(p.price)} ${S.company.symbol} · stock ${p.qty})</option>`).join('')}</select><div id="f-qty-wrap" style="display:none"><label>Quantité</label><input id="f-qty" type="number" min="1" value="1" oninput="fluxProd()"></div>`:''}
  <div class="grid2"><div><label>Montant (${S.company.symbol})</label><input id="f-amt" type="number" min="0" inputmode="numeric"></div><div><label>Date</label><input id="f-date" type="date" value="${todayStr()}"></div></div>
  <label>Catégorie</label><select id="f-cat">${cats.map(c=>`<option>${c}</option>`).join('')}</select>
  <label>Description (optionnel)</label><input id="f-desc" placeholder="${FLUX==='in'?'Ex. : Vente comptoir':'Ex. : Facture électricité juin'}">
  <button class="btn ${FLUX==='in'?'btn-p':'btn-d'} btn-full mt" onclick="addTx()">Enregistrer</button>
 </div>
 <div class="card"><h3>Historique (${list.length})</h3>${list.length?list.slice(0,150).map(x=>txRow(x,true)).join(''):'<div class="empty">Aucune opération pour le moment.</div>'}</div>`;
};
function fluxProd(){
 const sel=document.getElementById('f-prod');if(!sel)return;
 const w=document.getElementById('f-qty-wrap');
 const p=S.products.find(x=>x.id===sel.value);
 if(!p){w.style.display='none';return;}
 w.style.display='block';
 const q=+document.getElementById('f-qty').value||1;
 document.getElementById('f-amt').value=p.price*q;
 document.getElementById('f-cat').value='Ventes';
}
function addTx(){
 const amt=+document.getElementById('f-amt').value;
 if(!amt||amt<=0){toast('Entrez un montant valide');return;}
 const sel=document.getElementById('f-prod');
 let productId=null,qty=null;
 if(FLUX==='in'&&sel&&sel.value){
  const p=S.products.find(x=>x.id===sel.value);
  qty=+(document.getElementById('f-qty')||{value:1}).value||1;
  if(p){if(qty>p.qty&&!confirm('Stock insuffisant ('+p.qty+' dispo). Enregistrer quand même ?'))return;productId=p.id;p.qty=Math.max(0,p.qty-qty);}
 }
 const desc=document.getElementById('f-desc').value.trim();
 S.tx.push({id:uid(),type:FLUX,amount:amt,cat:document.getElementById('f-cat').value,desc,date:document.getElementById('f-date').value||todayStr(),productId,qty});
 log((FLUX==='in'?'Encaissement':'Décaissement')+' de '+fmt(amt)+(desc?' — '+desc:'')+(productId?' (stock mis à jour)':''));
 save();R.flux();toast('Opération enregistrée');
}
function delTx(id){
 const t=S.tx.find(x=>x.id===id);if(!t)return;
 if(!confirm('Supprimer cette opération de '+fmt(t.amount)+' ?'))return;
 if(t.productId&&t.type==='in'&&t.qty){const p=S.products.find(q=>q.id===t.productId);if(p)p.qty+=t.qty;}
 S.tx=S.tx.filter(x=>x.id!==id);
 log('Opération supprimée ('+fmt(t.amount)+')');
 save();if(R[CUR])R[CUR]();
}

/* ===== Salaires ===== */
let SALM=curMonth();
R.sal=function(){
 const tot=S.employees.reduce((a,e)=>a+e.salary,0);
 document.getElementById('v-sal').innerHTML=`
 <div class="card"><h2>Salaires</h2>
  <label>Mois</label><input type="month" id="sal-m" value="${SALM}" onchange="SALM=this.value;R.sal()">
  <div class="fine mt">Masse salariale mensuelle : <b>${fmt(tot)}</b></div>
  <div class="twrap mt"><table><tr><th>Employé</th><th>Salaire</th><th>Statut</th><th class="adm"></th></tr>
  ${S.employees.map(e=>{
   const pay=S.salPays.find(p=>p.empId===e.id&&p.month===SALM);
   return `<tr><td><b>${esc(e.name)}</b><br><span class="fine">${esc(e.role||'')}</span></td><td>${fmt(e.salary)}</td><td>${pay?`<span class="chip chip-g">Payé le ${dateLabel(pay.date)}</span>`:'<span class="chip chip-a">À payer</span>'}</td><td class="adm">${pay?'':`<button class="btn btn-sm btn-p" onclick="paySal('${e.id}')">Payer</button> `}<button class="btn btn-sm btn-d" onclick="delEmp('${e.id}')">✕</button></td></tr>`;
  }).join('')||'<tr><td colspan="4"><div class="empty">Aucun employé enregistré.</div></td></tr>'}
  </table></div></div>
 <div class="card adm"><h3>Ajouter un employé</h3>
  <label>Nom complet</label><input id="e-name">
  <div class="grid2"><div><label>Poste</label><input id="e-role" placeholder="Ex. : Vendeur"></div><div><label>Salaire mensuel</label><input id="e-sal" type="number" min="0"></div></div>
  <button class="btn btn-p btn-full mt" onclick="addEmp()">Ajouter</button></div>`;
};
function addEmp(){
 const n=document.getElementById('e-name').value.trim(),r=document.getElementById('e-role').value.trim(),s=+document.getElementById('e-sal').value;
 if(!n||!s){toast('Nom et salaire requis');return;}
 S.employees.push({id:uid(),name:n,role:r,salary:s});log('Employé ajouté : '+n);save();R.sal();
}
function delEmp(id){
 const e=S.employees.find(x=>x.id===id);if(!e)return;
 if(!confirm('Retirer '+e.name+' de la liste ? L’historique de paie est conservé.'))return;
 S.employees=S.employees.filter(x=>x.id!==id);log('Employé retiré : '+e.name);save();R.sal();
}
function paySal(id){
 const e=S.employees.find(x=>x.id===id);if(!e)return;
 if(!confirm('Payer le salaire de '+e.name+' ('+fmt(e.salary)+') pour '+monthLabel(SALM)+' ? Un décaissement sera créé.'))return;
 const d=todayStr();
 S.salPays.push({id:uid(),empId:id,month:SALM,amount:e.salary,date:d});
 S.tx.push({id:uid(),type:'out',amount:e.salary,cat:'Salaires',desc:'Salaire '+e.name+' — '+monthLabel(SALM),date:d,productId:null,qty:null});
 log('Salaire payé : '+e.name+' — '+monthLabel(SALM)+' ('+fmt(e.salary)+')');
 save();R.sal();toast('Salaire enregistré');
}

/* ===== Objectifs ===== */
R.obj=function(){
 const gs=[...S.goals].sort((a,b)=>b.month.localeCompare(a.month));
 document.getElementById('v-obj').innerHTML=`
 <div class="card adm"><h2>Nouvel objectif</h2>
  <div class="grid2"><div><label>Mois</label><input type="month" id="g-m" value="${curMonth()}"></div><div><label>Encaissements visés</label><input id="g-t" type="number" min="1"></div></div>
  <button class="btn btn-p btn-full mt" onclick="addGoal()">Définir l’objectif</button></div>
 <div class="card"><h2>Objectifs</h2>
 ${gs.map(g=>{
  const enc=txMonth(g.month,'in'),pc=Math.min(100,enc/g.target*100);
  return `<div style="padding:.6rem 0;border-bottom:1px solid var(--ligne)"><div style="display:flex;justify-content:space-between;font-weight:700;gap:.5rem"><span>${monthLabel(g.month)}</span><span>${fmt(enc)} / ${fmt(g.target)}</span></div><div class="pbar"><i class="${enc>=g.target?'done':''}" style="width:${pc}%"></i></div><div style="display:flex;justify-content:space-between;align-items:center"><span class="fine">${Math.round(enc/g.target*100)} % atteint${enc>=g.target?' — objectif réussi !':''}</span><button class="btn btn-sm btn-d adm" onclick="delGoal('${g.id}')">Supprimer</button></div></div>`;
 }).join('')||'<div class="empty">Définissez un objectif mensuel pour suivre votre progression.</div>'}</div>`;
};
function addGoal(){
 const m=document.getElementById('g-m').value,t=+document.getElementById('g-t').value;
 if(!m||!t){toast('Mois et montant requis');return;}
 if(S.goals.some(g=>g.month===m)){toast('Un objectif existe déjà pour ce mois');return;}
 S.goals.push({id:uid(),month:m,target:t});log('Objectif défini : '+monthLabel(m)+' — '+fmt(t));save();R.obj();
}
function delGoal(id){S.goals=S.goals.filter(g=>g.id!==id);save();R.obj();}
</script>
<script>
'use strict';
/* ===== Stocks ===== */
R.stock=function(){
 const val=S.products.reduce((a,p)=>a+p.qty*(p.cost||p.price||0),0);
 document.getElementById('v-stock').innerHTML=`
 <div class="card"><h2>Stocks</h2><div class="fine">Valeur estimée du stock : <b>${fmt(val)}</b></div>
 <div class="twrap mt"><table><tr><th>Produit</th><th>Stock</th><th>Prix vente</th><th>Prix achat</th><th class="adm"></th></tr>
 ${S.products.map(p=>`<tr class="${p.qty<=p.alert&&p.alert>0?'tr-alert':''}"><td><b>${esc(p.name)}</b></td><td><b>${p.qty}</b>${p.qty<=p.alert&&p.alert>0?' ⚠':''}</td><td>${NF.format(p.price)}</td><td>${NF.format(p.cost||0)}</td><td class="adm"><button class="btn btn-sm btn-p" onclick="moveStock('${p.id}',1)">+ Entrée</button> <button class="btn btn-sm btn-a" onclick="moveStock('${p.id}',-1)">− Sortie</button> <button class="btn btn-sm btn-o" onclick="editProd('${p.id}')">Modifier</button> <button class="btn btn-sm btn-d" onclick="delProd('${p.id}')">✕</button></td></tr>`).join('')||'<tr><td colspan="5"><div class="empty">Aucun produit. Ajoutez-en ci-dessous.</div></td></tr>'}
 </table></div></div>
 <div class="card adm"><h3>Ajouter un produit / service</h3>
  <label>Nom</label><input id="p-name">
  <div class="grid2"><div><label>Prix de vente</label><input id="p-price" type="number" min="0"></div><div><label>Prix d’achat (coût)</label><input id="p-cost" type="number" min="0"></div></div>
  <div class="grid2"><div><label>Stock initial</label><input id="p-qty" type="number" min="0" value="0"></div><div><label>Seuil d’alerte</label><input id="p-alert" type="number" min="0" value="5"></div></div>
  <button class="btn btn-p btn-full mt" onclick="addProd()">Ajouter</button></div>`;
};
function addProd(){
 const n=document.getElementById('p-name').value.trim();
 if(!n){toast('Nom requis');return;}
 S.products.push({id:uid(),name:n,price:+document.getElementById('p-price').value||0,cost:+document.getElementById('p-cost').value||0,qty:+document.getElementById('p-qty').value||0,alert:+document.getElementById('p-alert').value||0});
 log('Produit ajouté : '+n);save();R.stock();
}
function delProd(id){
 const p=S.products.find(x=>x.id===id);if(!p)return;
 if(!confirm('Supprimer '+p.name+' ?'))return;
 S.products=S.products.filter(x=>x.id!==id);log('Produit supprimé : '+p.name);save();R.stock();
}
function moveStock(id,dir){
 const p=S.products.find(x=>x.id===id);if(!p)return;
 const q=+prompt((dir>0?'Quantité entrée en stock':'Quantité sortie du stock')+' — '+p.name+' :');
 if(!q||q<=0)return;
 if(dir<0&&q>p.qty){toast('Stock insuffisant ('+p.qty+' disponibles)');return;}
 p.qty+=dir*q;
 log((dir>0?'Entrée':'Sortie')+' stock : '+p.name+' ×'+q+' (reste '+p.qty+')');
 save();R.stock();
}
function editProd(id){
 const p=S.products.find(x=>x.id===id);if(!p)return;
 openModal(`<h2>Modifier le produit <button class="close" onclick="closeSheet('sheet-modal')">×</button></h2>
 <label>Nom</label><input id="ep-name" value="${esc(p.name)}">
 <div class="grid2"><div><label>Prix de vente</label><input id="ep-price" type="number" value="${p.price}"></div><div><label>Prix d’achat</label><input id="ep-cost" type="number" value="${p.cost||0}"></div></div>
 <div class="grid2"><div><label>Stock</label><input id="ep-qty" type="number" value="${p.qty}"></div><div><label>Seuil d’alerte</label><input id="ep-alert" type="number" value="${p.alert}"></div></div>
 <button class="btn btn-p btn-full mt" onclick="saveProd('${p.id}')">Enregistrer</button>`);
}
function saveProd(id){
 const p=S.products.find(x=>x.id===id);if(!p)return;
 p.name=document.getElementById('ep-name').value.trim()||p.name;
 p.price=+document.getElementById('ep-price').value||0;
 p.cost=+document.getElementById('ep-cost').value||0;
 p.qty=+document.getElementById('ep-qty').value||0;
 p.alert=+document.getElementById('ep-alert').value||0;
 log('Produit modifié : '+p.name);save();closeSheet('sheet-modal');R.stock();
}

/* ===== Factures ===== */
let INV_LINES=[],INV_FROM_TX=null,INV_DATE=null,FFILT='all';
function invTotals(iv){const ht=iv.lines.reduce((a,l)=>a+l.qty*l.pu,0),tva=ht*(iv.tva||0)/100;return{ht,tva,ttc:ht+tva};}
R.fact=function(){
 const all=[...S.invoices].sort((a,b)=>b.num.localeCompare(a.num));
 const list=all.filter(iv=>FFILT==='all'||(FFILT==='paid'?iv.paid:!iv.paid));
 const nb={all:all.length,paid:all.filter(i=>i.paid).length,unpaid:all.filter(i=>!i.paid).length};
 document.getElementById('v-fact').innerHTML=`
 <button class="btn btn-p btn-full adm" onclick="newInvoice()" style="margin-bottom:1rem">+ Nouvelle facture</button>
 <div class="tabs"><button class="${FFILT==='all'?'on':''}" onclick="FFILT='all';R.fact()">Toutes (${nb.all})</button><button class="${FFILT==='paid'?'on':''}" onclick="FFILT='paid';R.fact()">Payées (${nb.paid})</button><button class="${FFILT==='unpaid'?'on':''}" onclick="FFILT='unpaid';R.fact()">Non payées (${nb.unpaid})</button></div>
 <div class="card"><h2>Historique</h2>
 ${list.map(iv=>{
  const t=invTotals(iv);
  return `<div class="row"><div class="rmain"><div class="rt">${esc(iv.num)} — ${esc(iv.client)}</div><div class="rs">${dateLabel(iv.date)} · ${fmt(t.ttc)}</div></div>${iv.paid?'<span class="chip chip-g">Payée</span>':'<span class="chip chip-a">En attente</span>'}<button class="btn btn-sm btn-o" onclick="invPreview('${iv.id}')">Aperçu</button>${iv.paid?'':`<button class="btn btn-sm btn-p adm" onclick="invPay('${iv.id}')">Encaisser</button><button class="btn btn-sm btn-d adm" onclick="invDel('${iv.id}')">✕</button>`}</div>`;
 }).join('')||'<div class="empty">Aucune facture dans ce filtre.</div>'}</div>`;
};
function invModal(title,hint){
 openModal(`<h2>${title} <button class="close" onclick="closeSheet('sheet-modal')">×</button></h2>
 ${hint?'<p class="fine">'+hint+'</p>':''}
 <label>Client</label><input id="iv-client" placeholder="Nom du client">
 <div class="grid2"><div><label>Téléphone (optionnel)</label><input id="iv-tel"></div><div><label>Date</label><input id="iv-date" type="date" value="${INV_DATE||todayStr()}"></div></div>
 <label>Lignes</label><div id="iv-lines"></div>
 <button class="btn btn-a btn-sm" onclick="invAddLine()">+ Ajouter une ligne</button>
 <label>TVA (%) — laissez 0 si non applicable</label><input id="iv-tva" type="number" min="0" value="0" oninput="invTotalPrev()">
 <div id="iv-total" class="mt" style="font-weight:800"></div>
 <button class="btn btn-p btn-full mt" onclick="saveInvoice()">${INV_FROM_TX?'Générer la facture':'Créer la facture'}</button>`);
 renderInvLines();
}
function newInvoice(){
 INV_FROM_TX=null;INV_DATE=null;
 INV_LINES=[{label:'',qty:1,pu:0,productId:''}];
 invModal('Nouvelle facture','');
}
function invoiceFromTx(txId){
 const t=S.tx.find(x=>x.id===txId);if(!t)return;
 const p=t.productId?S.products.find(q=>q.id===t.productId):null;
 const qty=t.qty||1;
 INV_FROM_TX=txId;INV_DATE=t.date;
 INV_LINES=[{label:t.desc||(p?p.name:t.cat),qty:qty,pu:Math.round(t.amount/qty),productId:''}];
 invModal('Facture depuis encaissement','La facture sera marquée <b>Payée</b> et liée à cet encaissement — aucun nouveau flux ni mouvement de stock ne sera créé.');
}
function invAddLine(){INV_LINES.push({label:'',qty:1,pu:0,productId:''});renderInvLines();}
function invRmLine(i){INV_LINES.splice(i,1);renderInvLines();}
function renderInvLines(){
 document.getElementById('iv-lines').innerHTML=INV_LINES.map((l,i)=>`
 <div style="border:1px solid var(--ligne);border-radius:10px;padding:.6rem;margin-bottom:.5rem">
  ${S.products.length?`<select onchange="invLineProd(${i},this.value)"><option value="">— Ligne libre —</option>${S.products.map(p=>`<option value="${p.id}" ${l.productId===p.id?'selected':''}>${esc(p.name)} (stock ${p.qty})</option>`).join('')}</select>`:''}
  <input class="mt" style="margin-top:.5rem" placeholder="Désignation" value="${esc(l.label)}" oninput="INV_LINES[${i}].label=this.value">
  <div class="grid2" style="margin-top:.5rem"><input type="number" min="1" placeholder="Qté" value="${l.qty}" oninput="INV_LINES[${i}].qty=+this.value||1;invTotalPrev()"><input type="number" min="0" placeholder="Prix unitaire" value="${l.pu||''}" oninput="INV_LINES[${i}].pu=+this.value||0;invTotalPrev()"></div>
  ${INV_LINES.length>1?`<button class="btn btn-sm btn-d" style="margin-top:.5rem" onclick="invRmLine(${i})">Retirer</button>`:''}
 </div>`).join('');
 invTotalPrev();
}
function invLineProd(i,pid){
 const p=S.products.find(x=>x.id===pid);
 INV_LINES[i].productId=pid;
 if(p){INV_LINES[i].label=p.name;INV_LINES[i].pu=p.price;}
 renderInvLines();
}
function invTotalPrev(){
 const ht=INV_LINES.reduce((a,l)=>a+(l.qty||0)*(l.pu||0),0);
 const tvaEl=document.getElementById('iv-tva');
 const tva=ht*((tvaEl?+tvaEl.value:0)||0)/100;
 const el=document.getElementById('iv-total');if(el)el.textContent='Total TTC : '+fmt(ht+tva);
}
function saveInvoice(){
 const client=document.getElementById('iv-client').value.trim();
 if(!client){toast('Nom du client requis');return;}
 const lines=INV_LINES.filter(l=>l.label.trim()&&l.qty>0).map(l=>({label:l.label.trim(),qty:l.qty,pu:l.pu,productId:l.productId||null}));
 if(!lines.length){toast('Ajoutez au moins une ligne');return;}
 const fromTx=INV_FROM_TX?S.tx.find(x=>x.id===INV_FROM_TX):null;
 if(!fromTx){for(const l of lines){if(l.productId){const p=S.products.find(x=>x.id===l.productId);if(p&&p.qty<l.qty){toast('Stock insuffisant pour '+p.name+' ('+p.qty+' dispo)');return;}}}}
 S.settings.invSeq++;
 const num='TRZ-'+new Date().getFullYear()+'-'+String(S.settings.invSeq).padStart(3,'0');
 const iv={id:uid(),num,client,phone:document.getElementById('iv-tel').value.trim(),date:document.getElementById('iv-date').value||todayStr(),lines,tva:+document.getElementById('iv-tva').value||0,paid:!!fromTx};
 if(!fromTx)lines.forEach(l=>{if(l.productId){const p=S.products.find(x=>x.id===l.productId);if(p)p.qty=Math.max(0,p.qty-l.qty);}});
 S.invoices.push(iv);
 if(fromTx){fromTx.invId=iv.id;log('Facture générée depuis un encaissement : '+num+' — '+client+' ('+fmt(invTotals(iv).ttc)+')');}
 else{log('Facture créée : '+num+' — '+client+' ('+fmt(invTotals(iv).ttc)+')');}
 const wasFromTx=!!fromTx;
 INV_FROM_TX=null;INV_DATE=null;
 save();closeSheet('sheet-modal');if(R[CUR])R[CUR]();toast('Facture '+num+(wasFromTx?' générée':' créée'));
 if(wasFromTx)setTimeout(()=>invPreview(iv.id),150);
}
function invPay(id){
 const iv=S.invoices.find(x=>x.id===id);if(!iv)return;
 const t=invTotals(iv);
 if(!confirm('Encaisser la facture '+iv.num+' ('+fmt(t.ttc)+') ? Un encaissement sera créé.'))return;
 iv.paid=true;
 S.tx.push({id:uid(),type:'in',amount:t.ttc,cat:'Ventes',desc:'Facture '+iv.num+' — '+iv.client,date:todayStr(),productId:null,qty:null});
 log('Facture encaissée : '+iv.num+' ('+fmt(t.ttc)+')');
 save();R.fact();toast('Encaissement enregistré');
}
function invDel(id){
 const iv=S.invoices.find(x=>x.id===id);if(!iv)return;
 if(!confirm('Supprimer la facture '+iv.num+' ? Les quantités seront remises en stock.'))return;
 iv.lines.forEach(l=>{if(l.productId){const p=S.products.find(x=>x.id===l.productId);if(p)p.qty+=l.qty;}});
 S.invoices=S.invoices.filter(x=>x.id!==id);
 log('Facture supprimée : '+iv.num);save();R.fact();
}
function invPDF(id){
 if(!window.jspdf){toast('Module PDF non chargé — connectez-vous une fois à Internet');return;}
 const iv=S.invoices.find(x=>x.id===id);if(!iv)return;
 const t=invTotals(iv);
 const doc=new window.jspdf.jsPDF();
 if(S.company.logo){try{doc.addImage(S.company.logo,'PNG',14,12,22,22);}catch(e){}}
 doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(14,90,69);
 doc.text(S.company.name,S.company.logo?40:14,20);
 doc.setFontSize(11);doc.setTextColor(60);
 doc.text('FACTURE '+iv.num,S.company.logo?40:14,27);
 doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(20);
 doc.text('Client : '+iv.client+(iv.phone?'   Tél : '+iv.phone:''),14,44);
 doc.text('Date : '+dateLabel(iv.date),14,50);
 doc.autoTable({startY:58,head:[['Désignation','Qté','P.U. ('+S.company.symbol+')','Total']],
  body:iv.lines.map(l=>[l.label,String(l.qty),NF.format(l.pu),NF.format(l.qty*l.pu)]),
  headStyles:{fillColor:[14,90,69]},styles:{font:'helvetica',fontSize:10}});
 let y=doc.lastAutoTable.finalY+8;
 doc.text('Total HT : '+NF.format(t.ht)+' '+S.company.symbol,130,y);
 if(iv.tva>0){y+=6;doc.text('TVA ('+iv.tva+' %) : '+NF.format(t.tva)+' '+S.company.symbol,130,y);}
 y+=7;doc.setFont('helvetica','bold');doc.setFontSize(12);
 doc.text('Total TTC : '+NF.format(t.ttc)+' '+S.company.symbol,130,y);
 doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(130);
 doc.text('Facture générée avec Trezo',14,287);
 doc.save(iv.num+'.pdf');
 log('PDF généré : '+iv.num);save();
}

 document.getElementById('v-jour').innerHTML=`<div class="card"><h2>Journal d’activité</h2>${S.journal.map(j=>`<div class="row"><div class="rmain"><div class="rt" style="font-weight:600;white-space:normal">${esc(j.txt)}</div><div class="rs">${new Date(j.d).toLocaleString('fr-FR')}</div></div></div>`).join('')||'<div class="empty">Aucune activité enregistrée pour le moment.</div>'}</div>`;

/* ===== Réglages ===== */
R.set=function(){
 const d=licDaysLeft();
 const email=(SESSION&&SESSION.user&&SESSION.user.email)||'';
 document.getElementById('v-set').innerHTML=`
 <div class="card"><h2>Entreprise</h2>
  <div class="adm"><label>Nom</label><input id="s-name" value="${esc(S.company.name)}">
  <label>Devise</label><select id="s-cur">${CURRENCIES.map(c=>`<option value="${c[0]}" ${S.company.currency===c[0]?'selected':''}>${c[2]} (${c[1]})</option>`).join('')}</select>
  <label>Logo</label><div style="display:flex;gap:.8rem;align-items:center"><img id="s-logo-prev" src="${S.company.logo||LOGO}" style="width:50px;height:50px;border-radius:12px;border:1px solid var(--ligne);object-fit:cover" alt=""><input type="file" accept="image/*" onchange="setLogo(this)"></div>
  <button class="btn btn-p btn-full mt" onclick="saveCompany()">Enregistrer</button></div></div>
 <div class="card"><h2>Licence</h2>
  <p class="fine">${S.license.trial?'Version d’essai gratuite.':'Clé : '+esc(S.license.key)}<br>Expire le <b>${new Date(S.license.expiry).toLocaleDateString('fr-FR')}</b> (${d>0?d+' jours restants':'expirée'}). La vérification s’effectue côté serveur : la date d’expiration ne peut pas être falsifiée.</p>
  <div class="adm"><label>Entrer une nouvelle clé (renouvellement)</label><input id="s-key" placeholder="TRZO-XXXX-XXXX-XXXX" style="text-transform:uppercase"><div id="s-key-msg"></div>
  <button class="btn btn-o btn-full mt" onclick="renewFromSettings()">Activer la clé</button></div></div>
 <div class="card"><h2>Compte</h2>
  <p class="fine">Connecté : <b>${esc(email)}</b>. Vos données sont synchronisées dans le cloud et accessibles depuis n’importe quel appareil avec cet identifiant.</p>
  <div class="grid2 mt"><button class="btn btn-o adm" onclick="cloudChangePass()">Changer le mot de passe</button><button class="btn btn-o" onclick="cloudSignOut()">Se déconnecter</button></div></div>
 <div class="card"><h2>Sécurité &amp; accès client</h2>
  <p class="fine">Le mode lecture seule (bouton 🔒 en haut) permet de confier l’appareil à un employé ou de montrer les chiffres à un client sans risque de modification. Le code PIN protège le déverrouillage.</p>
  <button class="btn btn-o btn-full mt adm" onclick="setPin()">${S.settings.pin?'Changer le code PIN':'Définir un code PIN'}</button></div>
 <div class="card"><h2>Données</h2>
  <button class="btn btn-p btn-full" onclick="exportExcel()">Exporter en Excel (.xlsx)</button>
  <button class="btn btn-o btn-full mt" onclick="backup()">Télécharger une archive (.json)</button>
  <label class="mt adm" style="display:block;margin-top:1rem"><span class="btn btn-o btn-full" style="display:flex">Importer une sauvegarde (migration)</span><input type="file" accept=".json,application/json" style="display:none" onchange="restore(this)"></label>
  <p class="fine mt">La sauvegarde cloud est automatique. L’archive JSON sert de copie personnelle et permet de migrer les données d’une installation Trezo Classique vers le cloud.</p>
  <button class="btn btn-d btn-full mt adm" onclick="resetAll()">Vider les données de l’entreprise</button></div>`;
};
function setLogo(inp){const f=inp.files[0];if(!f)return;resizeImg(f,url=>{S.company.logo=url;document.getElementById('s-logo-prev').src=url;save();renderHeader();toast('Logo mis à jour');});}
async function saveCompany(){
 const n=document.getElementById('s-name').value.trim();
 if(n&&n!==S.company.name&&!confirm('Attention : les clés de licence sont liées au nom de l’entreprise. Après un changement de nom, les prochaines clés devront être générées avec le nouveau nom. Continuer ?'))return;
 const c=document.getElementById('s-cur').value;
 const sym=CURRENCIES.find(x=>x[0]===c)[1];
 const r=await SB.from('companies').update({name:n||S.company.name,currency:c,symbol:sym}).eq('id',COMPANY.id).select().single();
 if(r.error){toast(authErr(r.error));return;}
 COMPANY=r.data;applyCompany();
 log('Informations entreprise mises à jour');save();renderHeader();R.set();toast('Enregistré');
}
async function setPin(){
 if(S.settings.pin){const old=prompt('Code PIN actuel :');if(old==null)return;if(await sha('PIN|'+old)!==S.settings.pin){toast('Code incorrect');return;}}
 const p=prompt('Nouveau code PIN (4 chiffres ou plus) :');
 if(!p||p.length<4){toast('Code trop court (4 caractères minimum)');return;}
 S.settings.pin=await sha('PIN|'+p);log('Code PIN mis à jour');save();toast('Code PIN enregistré');R.set();
}
async function renewFromSettings(){
 const k=document.getElementById('s-key').value.trim();
 const msg=document.getElementById('s-key-msg');
 if(!k){msg.innerHTML='<div class="msg-err">Entrez une clé.</div>';return;}
 msg.innerHTML='<div class="fine">Vérification…</div>';
 const r=await SB.rpc('renew_license',{p_company:COMPANY.id,p_key:k});
 if(r.error){msg.innerHTML='<div class="msg-err">'+esc(authErr(r.error))+'</div>';return;}
 COMPANY.license_expiry=r.data;COMPANY.license_key=k.toUpperCase();COMPANY.is_trial=false;applyCompany();
 log('Nouvelle licence activée (expire le '+new Date(r.data).toLocaleDateString('fr-FR')+')');
 save();renderHeader();R.set();toast('Licence activée');
}
async function cloudChangePass(){
 const p=prompt('Nouveau mot de passe (6 caractères min.) :');
 if(!p)return;
 if(p.length<6){toast('Mot de passe trop court');return;}
 const r=await SB.auth.updateUser({password:p});
 if(r.error){toast(authErr(r.error));return;}
 log('Mot de passe du compte modifié');save();toast('Mot de passe mis à jour');
}
function backup(){
 const out={v:2,cloud:true,company:S.company,products:S.products,tx:S.tx,employees:S.employees,salPays:S.salPays,goals:S.goals,invoices:S.invoices,journal:S.journal,settings:S.settings};
 const blob=new Blob([JSON.stringify(out,null,1)],{type:'application/json'});
 const a=document.createElement('a');a.href=URL.createObjectURL(blob);
 a.download='trezo-archive-'+todayStr()+'.json';a.click();
 log('Archive exportée');save();
}
function restore(inp){
 const f=inp.files[0];if(!f)return;
 const r=new FileReader();
 r.onload=e=>{
  try{
   const d=JSON.parse(e.target.result);
   if(!d.v)throw 0;
   if(!confirm('Remplacer les données actuelles (flux, stocks, factures…) par celles de ce fichier ? Le nom d’entreprise et la licence ne changent pas.'))return;
   ['products','tx','employees','salPays','goals','invoices','journal'].forEach(k=>{S[k]=Array.isArray(d[k])?d[k]:[];});
   S.settings=Object.assign({},DEFAULT.settings,d.settings||{});
   if(d.company&&d.company.logo)S.company.logo=d.company.logo;
   log('Sauvegarde importée ('+S.tx.length+' opérations)');
   save();renderHeader();if(R[CUR])R[CUR]();toast('Données importées et synchronisées');
  }catch(err){toast('Fichier de sauvegarde invalide');}
 };
 r.readAsText(f);
}
function resetAll(){
 if(!confirm('Vider toutes les données de l’entreprise (flux, stocks, factures, salaires…) ? Le compte et la licence sont conservés.'))return;
 if(prompt('Tapez EFFACER pour confirmer :')!=='EFFACER')return;
 ['products','tx','employees','salPays','goals','invoices','journal'].forEach(k=>S[k]=[]);
 S.settings=Object.assign({},DEFAULT.settings);
 log('Données de l’entreprise réinitialisées');
 save();if(R[CUR])R[CUR]();renderHeader();toast('Données vidées');
}
function exportExcel(){
 if(!window.XLSX){toast('Module Excel non chargé — connectez-vous une fois à Internet');return;}
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.tx.map(x=>({Date:x.date,Type:x.type==='in'?'Encaissement':'Décaissement',Montant:x.amount,'Catégorie':x.cat,Description:x.desc||''}))),'Transactions');
 XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.salPays.map(p=>{const e=S.employees.find(x=>x.id===p.empId);return{Mois:p.month,'Employé':e?e.name:'(retiré)',Montant:p.amount,'Payé le':p.date};})),'Salaires');
 XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.products.map(p=>({Produit:p.name,'Prix vente':p.price,'Prix achat':p.cost||0,Stock:p.qty,'Seuil alerte':p.alert}))),'Stocks');
 XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(S.invoices.map(i=>{const t=invTotals(i);return{'Numéro':i.num,Date:i.date,Client:i.client,'Total TTC':t.ttc,Statut:i.paid?'Payée':'En attente'};})),'Factures');
 XLSX.writeFile(wb,'trezo-export-'+todayStr()+'.xlsx');
 log('Export Excel généré');save();
}

/* ===== Démarrage ===== */
function initApp(){renderNav();renderHeader();go('dash');}
async function boot(){
 renderNav();
 if('serviceWorker' in navigator){try{navigator.serviceWorker.register('sw.js').catch(()=>{});}catch(e){}}
 if(!CONFIG.url||!CONFIG.anonKey||CONFIG.url.indexOf('VOTRE-PROJET')>=0||CONFIG.anonKey.indexOf('COLLEZ')>=0){
  obShow('<h2>Configuration requise</h2><p class="fine">Le fichier <b>config.js</b> n’est pas encore renseigné. Ouvrez-le et collez l’URL du projet Supabase et la clé « anon public » (Project Settings → API), puis redéployez. Voir le LISEZ-MOI.</p>',0);
  return;
 }
 if(!window.supabase||!window.supabase.createClient){
  obShow('<h2>Chargement incomplet</h2><p class="fine">La bibliothèque Supabase n’a pas pu être chargée. Vérifiez votre connexion Internet puis rechargez la page.</p><button class="btn btn-p btn-full mt" onclick="location.reload()">Recharger</button>',0);
  return;
 }
 SB=window.supabase.createClient(CONFIG.url,CONFIG.anonKey);
 const s=await SB.auth.getSession();
 if(!s.data||!s.data.session){showAuth('login');return;}
 SESSION=s.data.session;
 await loadWorkspace();
}
window.addEventListener('DOMContentLoaded',boot);
</script>
<script>
'use strict';
/* ===== Import de template (module Flux) ===== */
let IMP={rows:[],errors:[]};
const stripAcc=s=>String(s==null?'':s).normalize('NFD').replace(/[\u0300-\u036f]/g,'');
function downloadTpl(){
 if(!window.XLSX){toast('Module Excel non chargé — connectez-vous une fois à Internet');return;}
 const ws=XLSX.utils.aoa_to_sheet([['Date','Type','Montant','Catégorie','Description'],['2026-07-01','Encaissement',150000,'Ventes','Vente comptoir'],['02/07/2026','Décaissement',40000,'Transport','Carburant semaine']]);
 ws['!cols']=[{wch:12},{wch:15},{wch:12},{wch:16},{wch:28}];
 const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Flux');
 XLSX.writeFile(wb,'trezo-modele-flux.xlsx');
}
function importTpl(){
 IMP={rows:[],errors:[]};
 openModal(`<h2>Importer un template <button class="close" onclick="closeSheet('sheet-modal')">×</button></h2>
 <p class="fine">Fichier <b>.xlsx</b> ou <b>.csv</b> avec les colonnes : <b>Date</b> (AAAA-MM-JJ ou JJ/MM/AAAA), <b>Type</b> (Encaissement / Décaissement), <b>Montant</b>, et en option <b>Catégorie</b> et <b>Description</b>. Le bouton « Modèle .xlsx » fournit le format exact. La structure est contrôlée avant tout import.</p>
 <input type="file" accept=".xlsx,.xls,.csv" onchange="handleImport(this)">
 <div id="imp-res"></div>`);
}
function impDate(v){
 if(v instanceof Date&&!isNaN(v))return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
 if(typeof v==='number'&&v>20000&&v<80000)return impDate(new Date(Math.round((v-25569)*86400000)));
 const s=String(v).trim();let m;
 if(m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/))return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
 if(m=s.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{4})/))return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
 return null;
}
function impType(v){
 const s=stripAcc(v).toLowerCase().trim();
 if(!s)return null;
 if(s.indexOf('enc')===0||s==='e'||s.indexOf('entr')===0||s==='in'||s.indexOf('recet')===0||s.indexOf('cred')===0)return'in';
 if(s.indexOf('dec')===0||s==='d'||s.indexOf('sort')===0||s==='out'||s.indexOf('depens')===0||s.indexOf('deb')===0)return'out';
 return null;
}
function impAmt(v){
 if(typeof v==='number')return v>0?v:null;
 const n=parseFloat(String(v).replace(/[\s\u00a0]/g,'').replace(',','.').replace(/[^0-9.\-]/g,''));
 return !isNaN(n)&&n>0?n:null;
}
function handleImport(inp){
 const f=inp.files[0];if(!f)return;
 if(!window.XLSX){toast('Module Excel non chargé — connectez-vous une fois à Internet');return;}
 const res=document.getElementById('imp-res');
 res.innerHTML='<div class="fine mt">Analyse du fichier…</div>';
 const r=new FileReader();
 r.onload=e=>{
  try{
   const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
   const ws=wb.Sheets[wb.SheetNames[0]];
   const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
   if(!rows.length){res.innerHTML='<div class="msg-err">Fichier vide ou illisible.</div>';return;}
   if(rows.length>5000){res.innerHTML='<div class="msg-err">Fichier trop volumineux ('+rows.length+' lignes, maximum 5 000).</div>';return;}
   const map={};
   Object.keys(rows[0]).forEach(k=>{const n=stripAcc(k).toLowerCase().trim();
    if(n==='date')map.date=k;else if(n==='type')map.type=k;else if(n==='montant'||n==='amount')map.amt=k;
    else if(n.indexOf('categ')===0)map.cat=k;else if(n.indexOf('desc')===0||n==='libelle')map.desc=k;});
   const miss=['date','type','amt'].filter(c=>!map[c]);
   if(miss.length){const noms={date:'Date',type:'Type',amt:'Montant'};res.innerHTML='<div class="msg-err">Structure invalide — colonne(s) manquante(s) : <b>'+miss.map(c=>noms[c]).join(', ')+'</b>. Téléchargez le modèle pour voir le format attendu.</div>';return;}
   IMP={rows:[],errors:[]};
   rows.forEach((row,i)=>{
    const line=i+2,errs=[];
    const d=impDate(row[map.date]);if(!d)errs.push('date invalide');
    const t=impType(row[map.type]);if(!t)errs.push('type invalide (attendu : Encaissement ou Décaissement)');
    const a=impAmt(row[map.amt]);if(!a)errs.push('montant invalide');
    if(errs.length){IMP.errors.push('Ligne '+line+' : '+errs.join(', '));return;}
    let cat=map.cat?String(row[map.cat]).trim().slice(0,40):'';
    if(!cat)cat='Autre';
    IMP.rows.push({type:t,amount:a,date:d,cat:cat,desc:map.desc?String(row[map.desc]).trim().slice(0,120):''});
   });
   const errHtml=IMP.errors.length?'<div class="msg-err" style="white-space:normal">'+IMP.errors.slice(0,10).map(esc).join('<br>')+(IMP.errors.length>10?'<br>… et '+(IMP.errors.length-10)+' autre(s) erreur(s)':'')+'</div>':'';
   res.innerHTML='<div class="'+(IMP.errors.length?'msg-err':'msg-ok')+'" style="margin-top:.8rem">'+IMP.rows.length+' ligne(s) valide(s) · '+IMP.errors.length+' erreur(s)</div>'+errHtml+(IMP.rows.length?'<button class="btn btn-p btn-full mt" onclick="doImport()">Importer les '+IMP.rows.length+' opération(s) valide(s)</button>':'');
  }catch(err){res.innerHTML='<div class="msg-err">Impossible de lire ce fichier. Vérifiez qu’il s’agit bien d’un .xlsx ou .csv.</div>';}
 };
 r.readAsArrayBuffer(f);
}
function doImport(){
 if(!IMP.rows.length)return;
 IMP.rows.forEach(x=>S.tx.push({id:uid(),type:x.type,amount:x.amount,cat:x.cat,desc:x.desc,date:x.date,productId:null,qty:null}));
 log('Import de '+IMP.rows.length+' opération(s) depuis un fichier');
 save();closeSheet('sheet-modal');R.flux();toast(IMP.rows.length+' opérations importées');
 IMP={rows:[],errors:[]};
}

/* ===== Facture : aperçu identique au document final + impression ===== */
function invDocHTML(iv){
 const t=invTotals(iv);
 return `<div class="inv-doc"><div class="inv-head">${S.company.logo?`<img src="${S.company.logo}" alt="">`:''}<div><div class="inv-co">${esc(S.company.name)}</div><div class="inv-num">FACTURE ${esc(iv.num)}${iv.paid?' — PAYÉE':''}</div></div></div>
 <div class="inv-meta"><div><b>Client :</b> ${esc(iv.client)}${iv.phone?'<br><b>Tél :</b> '+esc(iv.phone):''}</div><div><b>Date :</b> ${dateLabel(iv.date)}</div></div>
 <table class="inv-table"><thead><tr><th>Désignation</th><th style="text-align:right">Qté</th><th style="text-align:right">P.U. (${esc(S.company.symbol)})</th><th style="text-align:right">Total</th></tr></thead><tbody>${iv.lines.map(l=>`<tr><td>${esc(l.label)}</td><td style="text-align:right">${l.qty}</td><td style="text-align:right">${NF.format(l.pu)}</td><td style="text-align:right">${NF.format(l.qty*l.pu)}</td></tr>`).join('')}</tbody></table>
 <div class="inv-tot"><div>Total HT : ${fmt(t.ht)}</div>${iv.tva>0?`<div>TVA (${iv.tva} %) : ${fmt(t.tva)}</div>`:''}<div class="ttc">Total TTC : ${fmt(t.ttc)}</div></div>
 <div class="inv-foot">Facture générée avec Trezo</div></div>`;
}
function invPreview(id){
 const iv=S.invoices.find(x=>x.id===id);if(!iv)return;
 openModal(`<h2>Aperçu — ${esc(iv.num)} <button class="close" onclick="closeSheet('sheet-modal')">×</button></h2>
 <div style="background:var(--sable);padding:.8rem;border-radius:12px;overflow:auto">${invDocHTML(iv)}</div>
 <div class="grid2 mt"><button class="btn btn-p" onclick="invPrint('${id}')">Imprimer</button><button class="btn btn-o" onclick="invPDF('${id}')">Télécharger PDF</button></div>`);
}
function invPrint(id){
 const iv=S.invoices.find(x=>x.id===id);if(!iv)return;
 document.getElementById('print-area').innerHTML=invDocHTML(iv);
 log('Impression : '+iv.num);save();
 setTimeout(()=>window.print(),50);
}
</script>
